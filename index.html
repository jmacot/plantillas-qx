<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantillas Quirúrgicas COT</title>
  <!-- Favicon e iconos -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#1a3a5c">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f8f9fb;
      --border: #d1d5db;
      --border-light: #e5e7eb;
      --accent: #1a3a5c;
      --accent-light: #eef2f7;
      --accent-hover: #14304f;
      --text: #222222;
      --text-muted: #555555;
      --text-light: #888888;
      --green: #16a34a;
      --green-light: #dcfce7;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 6px 24px rgba(26,33,51,0.10);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px 24px 10px;
      gap: 10px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .back-home {
      position: fixed;
      top: 10px;
      left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: border-color 0.2s, color 0.2s;
      z-index: 100;
    }
    .back-home:hover { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 600px) {
      .back-home { padding: 4px 8px; font-size: 10px; top: 6px; left: 6px; }
    }

    .app-header {
      text-align: center;
      flex-shrink: 0;
    }
    .app-header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.3rem, 3vw, 1.7rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .app-header h1 svg {
      width: 28px;
      height: 28px;
      opacity: 0.7;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    /* ── FORM ROW ── */
    .form-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 16px;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,58,92,0.10);
    }

    /* ── SELECT (desplegable) ── */
    select#procedimiento {
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    select#procedimiento:hover {
      background: var(--accent-hover);
      box-shadow: var(--shadow-hover);
    }
    select#procedimiento optgroup {
      background: #0f2240;
      color: #7db8f0;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      padding: 8px 0 4px;
      border-top: 2px solid #334155;
    }
    select#procedimiento option {
      background: #1e293b;
      color: #e2e8f0;
      padding: 4px 16px;
    }

    /* ── BOTONES ── */
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', Arial, sans-serif;
    }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-green {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', Arial, sans-serif;
    }
    .btn-green:hover { background: #15803d; transform: translateY(-1px); }
    .btn-green:active { transform: translateY(0); }

    .btn-danger {
      background: transparent;
      color: #dc2626;
      border: 1.5px solid #dc2626;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', Arial, sans-serif;
    }
    .btn-danger:hover { background: #dc2626; color: white; }

    /* ── PANELES DE TEXTO ── */
    .panels-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .panel:hover {
      box-shadow: var(--shadow-hover);
    }
    .panel.panel-green {
      border-color: var(--green);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--accent-light);
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }
    .panel.panel-green .panel-header {
      background: var(--green-light);
      border-bottom-color: var(--green);
    }

    .panel-title {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title .icon {
      font-size: 1.1rem;
    }
    .panel.panel-green .panel-title {
      color: var(--green);
    }

    .panel textarea {
      flex: 1;
      border: none;
      outline: none;
      background: var(--surface2);
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text);
      resize: none;
      overflow-y: auto;
    }
    .panel textarea::selection {
      background: rgba(26,58,92,0.15);
    }

    /* ── TOOLTIP COPIAR ── */
    .copy-wrap { position: relative; }
    .copy-tooltip {
      position: absolute;
      background: var(--accent);
      color: white;
      padding: 3px 12px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      top: -32px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }
    .copy-tooltip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FOOTER ── */
    .app-footer {
      text-align: center;
      flex-shrink: 0;
      padding: 2px 0;
    }
    .app-footer span {
      font-size: 0.7rem;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    /* ── TOAST BANNER ── */
    .toast-banner {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #7c3aed;
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', Arial, sans-serif;
      box-shadow: 0 8px 32px rgba(124,58,237,0.30);
      z-index: 9999;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast-banner.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      html, body { height: auto; overflow: auto; }
      #app { height: auto; padding-bottom: 20px; }
      .form-row { flex-direction: column; }
      .form-group { width: 100%; }
      .form-group input, .form-group select { width: 100% !important; }
      select#procedimiento { width: 100%; }
      .panels-grid { grid-template-columns: 1fr; flex: none; }
      .panel textarea { min-height: 200px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- TOAST -->
  <div id="toast" class="toast-banner"></div>

  <!-- CABECERA -->
  <a class="back-home" href="https://jmacot.github.io/" title="Volver al inicio">← Inicio</a>

  <div class="app-header">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 3.5L20 16l-3.5 3.5L3 6.5 7.5 3.5z"/><path d="M3 20l4-1 1-4"/><path d="M7 17l-4 3"/></svg>
      Plantillas Quirúrgicas COT
    </h1>
  </div>

  <!-- FORMULARIO -->
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label>Cirujano</label>
        <input id="doctor" type="text" placeholder="Apellido cirujano" oninput="cargarPlantilla()" style="width:280px" />
      </div>
      <div class="form-group">
        <label>Ayudante</label>
        <input id="ayudante" type="text" placeholder="Apellido ayudante" oninput="cargarPlantilla()" style="width:280px" />
      </div>
      <div class="form-group" style="flex:1">
        <label>Intervención</label>
        <select id="procedimiento" onchange="cargarPlantilla()">
          <option value="">— Seleccione un procedimiento —</option>
          <optgroup label="━━━ TRAUMA ━━━">
            <option value="canulados_cadera">Canulados cadera — tornillos canulados (Stryker)</option>
            <option value="gamma3">Clavo Gamma3 — Fr pertrocantérea cadera (Stryker)</option>
            <option value="ptc_exeter">PPC Exeter (Stryker)</option>
            <option value="rafi_periprotesica">RAFI Fr periprotésica cadera — Placa NCB (Zimmer)</option>
            <option value="rafi_supracondilea">RAFI Fr supracondílea fémur — Placa AXSOS (Stryker)</option>
            <option value="rafi_rotula_cerclaje">RAFI Fr rótula — cerclaje obenque (agujas K + alambre)</option>
            <option value="clavo_tibia_t2_stryker">Clavo T2 tibia — fresado (Stryker)</option>
            <option value="rafi_tobillo">RAFI Tobillo — placa baja energía peroné distal (Stryker)</option>
            <option value="aquiles">Sutura tendón Aquiles (mini-open, Ma-Griffith)</option>
            <option value="rafi_edr_aculoc2">RAFI Fr distal radio — Placa Aculoc-2 (Acumed)</option>
            <option value="rafi_humero_axsos">RAFI Húmero proximal/diafisario — Placa AxSOS (Stryker)</option>
            <option value="rafi_clavicula">RAFI Clavícula — Placa Variax (Stryker)</option>
            <option value="monteggia">Fr Monteggia / olécranon — Placa Peri-Loc (S&amp;N)</option>
          </optgroup>
            <optgroup label="━━━ CAR — ARTROSCOPIA RODILLA ━━━">
            <option value="car_mosaicoplastia">CAR Mosaicoplastia</option>
            <option value="car_fr_meseta">CAR + Fr meseta tibial</option>
            <option value="car_reinsercion_espina">CAR Reinserción avulsión espina tibial LCA</option>
            <option value="car_lrr_ficat_plicatura">CAR Ficat + plicatura ARI (Lanny Johnson)</option>
            <option value="car_sher_plicatura">CAR SHER plicatura ARI + Ficat</option>
            <option value="car_otv_adiccion">CAR + OTV adicción</option>
            <option value="car_otv_sustraccion">CAR + OTV sustracción (Coventry)</option>
            <option value="car_otv_varizante_femur">CAR + Osteotomía varizante fémur</option>
            <option value="car_otv_tomofix">OTV placa Tomofix (sin CAR)</option>
            <option value="car_meniscectomia">CAR Meniscectomía parcial</option>
            <option value="car_sutura_meniscal">CAR Sutura meniscal</option>
            <option value="car_artrolisis">CAR Artrolisis + movilización bajo anestesia</option>
            <option value="car_diagnostica">CAR Diagnóstica</option>
            <option value="car_cuerpo_libre">CAR Extracción cuerpo libre</option>
            <option value="car_ficat">CAR Ficat</option>
            <option value="car_toilette">CAR Toilette</option>
            <option value="car_sinovectomia">CAR Sinovectomía total</option>
          </optgroup>
            <optgroup label="━━━ PRÓTESIS DE CADERA (PTC) ━━━">
            <option value="ptc_summit">PTC Summit (DePuy)</option>
            <option value="ptc_zimmer">PTC Zimmer (G7 + Taperloc)</option>
          </optgroup>
            <optgroup label="━━━ PRÓTESIS DE RODILLA ━━━">
            <option value="ptr_triathlon">PTR Triathlon (Stryker)</option>            <option value="puc_pkr">PUC PKR (Stryker)</option>
            <option value="rpuc">Revisión PUC (RPUC)</option>
          </optgroup>
            <optgroup label="━━━ LCA — Stryker ━━━">
            <option value="lca_procinch">LCA ProCinch anatómico ST-RI</option>
            <option value="lca_procinch_allinside">LCA ProCinch anatómico ALL-INSIDE</option>
            <option value="lca_procinch_lemaire">LCA ProCinch + Lemaire</option>
            <option value="lca_procinch_sutura">LCA ProCinch + sutura meniscal</option>
            <option value="lca_procinch_reinsercion">LCA ProCinch + reinserción raíz meniscal posterior</option>          </optgroup>
            <optgroup label="━━━ LCA — Otros / Revisión ━━━">
            <option value="lca_allinside_arthrex">LCA ALL-INSIDE (Arthrex)</option>
            <option value="lca_hth">LCA Hueso-Tendón-Hueso (HTH)</option>
            <option value="lca_aum_am">LCA Aumentación AM</option>
            <option value="lca_aum_pl">LCA Aumentación PL</option>
            <option value="lca_rescate">LCA Rescate — revisión</option>
            <option value="lca_rescate_hth_lemaire">LCA Rescate — HTH banco + Lemaire</option>
          </optgroup>
            <optgroup label="━━━ ARTROSCOPIA CADERA (CAC) ━━━">
            <option value="cac_labrum">Reinserción labrum acetabular</option>
          </optgroup>
            <optgroup label="━━━ MIEMBRO SUPERIOR ━━━">
            <option value="ms_stc">Síndrome del túnel carpiano (STC)</option>
            <option value="ms_tcg">TCG Mano (quiste sinovial)</option>
            <option value="ms_dedo_resorte">Dedo en resorte — apertura polea A1</option>
            <option value="ms_dedo_resorte_tenolisis">Dedo en resorte — tenolisis</option>
            <option value="ms_fedr_dvr">RAFI Fr distal radio — Placa DVR</option>
            <option value="ms_fedr_acumed">RAFI Fr distal radio — Placa ACUMED</option>
            <option value="ms_fr_radio">Fr radio diafisario — placa</option>
            <option value="ms_fr_cubito_radio">Fr cúbito + radio — doble placa</option>
            <option value="ms_fr_humero">Fr húmero diafisario — placa</option>
            <option value="ms_fr_olecranon_placa">Fr olécranon — placa</option>
            <option value="ms_fr_olecranon_cerclaje">Fr olécranon — cerclaje</option>
            <option value="ms_seccion_tendon">Sección tendón flexor mano</option>
            <option value="ms_clavo_humero">Clavo T2 húmero retrógrado</option>
          </optgroup>
        </select>
      </div>
      <div style="align-self:flex-end">
        <button onclick="limpiar()" class="btn-danger">Limpiar</button>
      </div>
    </div>
  </div>

  <!-- PANELES DE TEXTO -->
  <div class="panels-grid">

    <!-- Hoja Operatoria -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title"><span class="icon">📋</span> Hoja Operatoria</span>
        <div class="copy-wrap">
          <button onclick="copiarTexto('hojaOperatoria')" class="btn-primary" style="padding:5px 16px; font-size:12px;">Copiar</button>
          <span class="copy-tooltip">✓ Copiado</span>
        </div>
      </div>
      <textarea id="hojaOperatoria"
        placeholder="Seleccione un procedimiento y complete los datos del cirujano..."></textarea>
    </div>

    <!-- Tratamiento al Alta -->
    <div class="panel panel-green">
      <div class="panel-header">
        <span class="panel-title"><span class="icon">💊</span> Tratamiento al Alta</span>
        <div class="copy-wrap">
          <button onclick="copiarTexto('tratamientoAlta')" class="btn-green" style="padding:5px 16px; font-size:12px;">Copiar</button>
          <span class="copy-tooltip">✓ Copiado</span>
        </div>
      </div>
      <textarea id="tratamientoAlta"
        placeholder="Aquí aparecerán las recomendaciones al alta..."></textarea>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="app-footer">
    <span>COT — Plantillas Quirúrgicas v2.0</span>
  </div>

</div>

  <script>
  // ─────────────────────────────────────────────
  //  UTILIDADES
  // ─────────────────────────────────────────────
  function hoy() {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = String(d.getFullYear()).slice(-2);
    return `${dd}/${mm}/${yy}`;
  }

  function cargarPlantilla() {
    const proc = document.getElementById('procedimiento').value;
    const doc  = (document.getElementById('doctor').value.trim() || 'DOCTOR').toUpperCase();
    const ayu  = (document.getElementById('ayudante').value.trim() || 'AYUDANTE').toUpperCase();
    if (!proc) return;
    const t = obtenerPlantillas(doc, ayu);
    const datos = t[proc];
    if (!datos) return;
    document.getElementById('hojaOperatoria').value   = datos.hoja;
    document.getElementById('tratamientoAlta').value  = datos.tratamiento;
  }

  function limpiar() {
    document.getElementById('procedimiento').value = '';
    document.getElementById('doctor').value = '';
    document.getElementById('ayudante').value = '';
    document.getElementById('hojaOperatoria').value = '';
    document.getElementById('tratamientoAlta').value = '';
  }

  function copiarTexto(id) {
    const el = document.getElementById(id);
    el.select();
    document.execCommand('copy');
    const label = id === 'tratamientoAlta' ? 'Tratamiento' : 'Hoja Operatoria';
    mostrarToast('✓  ' + label + ' copiado al portapapeles');
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast-banner';
    void t.offsetWidth;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.classList.remove('show'); }, 2200);
  }

  // ─────────────────────────────────────────────
  //  PLANTILLAS
  // ─────────────────────────────────────────────
  function obtenerPlantillas(DOCTOR, AYUDANTE) {
    const FECHA = hoy();

    return {
// ── TRAUMA ──────────────────────────────
    canulados_cadera: {
hoja: `IQ ${FECHA} (${DOCTOR}/${AYUDANTE})

CANULADOS CADERA (STRYKER)
Procedimiento Quirúrgico:
Anestesia: Regional.
Profilaxis antibiótica: 2g de cefazolina intravenosa.
Posición: Decúbito supino en mesa de tracción con control por escopia.
Técnica quirúrgica: Reducción cerrada de la fractura.
Fijación interna: Tres tornillos canulados en disposición de triángulo invertido:
Tornillo inferior: 100 mm con arandela.
Tornillos anterosuperior y posterosuperior: 100 mm y 95 mm respectivamente, sin arandela.
Verificación: Comprobación de adecuada reducción y correcta colocación del material de osteosíntesis.
Lavado: Abundante con suero fisiológico.
Cierre: Por planos con sutura reabsorbible y piel con grapas.
Apósito: Compresivo.`,

tratamiento: `- Cuidados Postoperatorios:
- Mantener pie elevado cuando esté sentada, moviendo el pie según las indicaciones.
- Realizar ejercicios de rehabilitación tal como se le ha explicado.
- Vigilar coloración y sensibilidad del pie y los dedos.
- Evitar carga de peso sobre la pierna intervenida hasta nuevo aviso. Puede solicitar silla de ruedas en préstamo.
- Requiere ayuda domiciliaria para facilitar la movilidad y realizar las actividades diarias.
- Medicación (según tarjeta sanitaria):
- METAMIZOL 575 mg cada 8 horas vía oral, alternando con PARACETAMOL 1g/8h si es necesario para el control del dolor.
- OMEPRAZOL 20 mg cada 24 horas.
- ENOXAPARINA 40 mg cada 24 horas vía subcutánea.
- VITAMINA D3: 4.000-6.000 UI/día durante 8-12 semanas, seguido de 2.000 UI/día de mantenimiento.
- Adecuada ingesta de calcio y proteínas en la dieta.
- Curas locales:

- EJERCICIOS POSTOPERATORIOS
- Encamado (primeros días tras intervención)
- Mover el tobillo
- Objetivo: Facilitar el retorno venoso y reducir la inflamación.
- Cómo hacerlo: Acostado(a) en la cama, mueva ambos tobillos hacia arriba y hacia abajo repetidamente.
- Frecuencia: Realice el mayor número de veces posible durante el día.
- Contracción del cuádriceps
- Objetivo: Fortalecer el músculo del muslo y mejorar la extensión de la rodilla.
- Cómo hacerlo: Coloque una toalla enrollada debajo de la rodilla. Contraiga el cuádriceps (músculo del muslo) intentando "aplastar" la toalla contra la cama.
- Duración: Mantenga la contracción durante 5 segundos.
- Repeticiones: Hágalo de 10 a 20 veces, 2-3 veces al día.
- Elevación de pierna recta
- Objetivo: Fortalecer los músculos de la pierna operada.
- Cómo hacerlo: Con la pierna sana doblada, mantenga la pierna operada recta, elévela unos 20-30 cm de la cama, mantenga por 5 segundos y bájela lentamente.
- Repeticiones: Realice de 100 a 300 elevaciones a lo largo del día.
- Flexión de rodilla en cama
- Objetivo: Mejorar el rango de movimiento de la rodilla.
- Cómo hacerlo: Deslice el talón de la pierna operada hacia los glúteos doblando la rodilla. Mantenga la flexión máxima por 5 segundos y luego vuelva a estirar la pierna.
- Repeticiones: Realice de 10 a 15 veces, 2-3 veces al día.
- Ejercicios Sentado(a) en Silla
- Flexión de rodilla
- Objetivo: Mejorar la flexión de la rodilla.
- Cómo hacerlo: Sentado(a) en el borde de una silla, con el pie en el suelo, flexione la rodilla operada lo máximo posible. Ayúdese con la pierna sana para aumentar la flexión. Mantenga la posición durante 5-10 segundos y luego estire la pierna.
- Repeticiones: Hágalo de 10 a 15 veces, 2-3 veces al día.
- Extensión de rodilla
- Objetivo: Mejorar la extensión completa de la rodilla.
- Cómo hacerlo: Sentado(a) en el borde de la silla, estire la pierna operada lo máximo posible. Ayúdese con la pierna sana para lograr una extensión máxima. Mantenga la posición durante 5-10 segundos y luego vuelva a la posición inicial.
- Repeticiones: Realice de 10 a 15 veces, 2-3 veces al día.
- Extensión pasiva de rodilla
- Objetivo: Mejorar la movilidad y reducir la rigidez.
- Cómo hacerlo: Coloque una silla frente a usted y extienda la pierna operada sobre ella, dejando que la rodilla se relaje y se extienda de forma pasiva durante 5-10 minutos.
- Frecuencia: Hágalo después de los ejercicios de flexión-extensión.
- Potenciación de aductores
- Objetivo: Fortalecer los músculos aductores del muslo.
- Cómo hacerlo: Coloque un cojín entre los muslos y presione hacia el centro con ambas piernas.
- Duración: Mantenga la presión por 10 segundos.
- Repeticiones: Realice 10 veces, 2-3 veces al día.
- CAMINAR CON MULETAS
- Primer paso: Avance las muletas.
- Segundo paso: Adelante la pierna operada (por ejemplo, la derecha) hasta el nivel de las muletas.
- Tercer paso: Avance la pierna sana.
- Uso de una sola muleta
- Cuando pase a usar una sola muleta, esta debe estar en el lado contrario a la pierna operada, avanzando a la vez que la pierna intervenida.
- CAMINAR CON ANDADOR
- Objetivo: Proporcionar mayor estabilidad y soporte al caminar durante la fase de recuperación.
- Cómo hacerlo:
- Posicionamiento inicial: Coloque el andador frente a usted, con las cuatro patas del andador firmemente apoyadas en el suelo. Asegúrese de que el andador esté bien ajustado a su altura para evitar tensiones en los hombros y brazos.
- Paso 1 - Mover el andador: Desplace el andador un paso hacia adelante, asegurándose de que permanezca siempre a una distancia cómoda y segura (aproximadamente un brazo de distancia).
- Paso 2 - Mover la pierna operada: Avance la pierna operada (o la más débil) hacia el centro del andador, colocándola entre las patas delanteras del andador. De esta manera, se asegura de que la mayor parte del peso se distribuye hacia el andador y no hacia su pierna.
- Paso 3 - Mover la pierna sana: Luego, avance la pierna sana hasta alcanzar la misma posición que la pierna operada, o más allá de esta si se siente seguro(a). Asegúrese de mantener un ritmo constante y equilibrado.
- Repetir el ciclo: Repita este ciclo de movimientos mientras camina, manteniendo siempre el andador delante de usted y utilizando sus brazos para apoyarse si es necesario.
- Consejos:
- Evite inclinarse demasiado hacia adelante o hacia atrás al caminar. Mantenga una postura erguida para reducir el riesgo de caídas.
- Avance el andador siempre antes de dar el paso con la pierna operada, para que sirva de soporte.
- No se apresure. Camine a un ritmo que le permita sentirse seguro(a) y estable.
- SUBIR Y BAJAR ESCALERAS
- Para subir escaleras:
- Coloque la pierna sana en el escalón superior.
- Apóyese en las muletas y la pierna sana para levantar la pierna operada.
- Para bajar escaleras:
- Coloque las muletas en el escalón inferior.
- Baje la pierna operada.
- Luego, baje la pierna sana.
- CUIDADOS DE LA HERIDA
- Mantenga la herida limpia y seca. Cambie los apósitos según lo indicado por su médico.
- Evite mojar la herida. Utilice coberturas impermeables si se ducha.

- Ante complicaciones en la herida: NO tomar antibióticos por cuenta propia. Acuda a urgencias para valoración médica.`

- 1ª y 2ª SEMANAS
- Carga parcial con dos muletas.

- Todos los ejercicios deben realizarse en un rango de movilidad sin dolor.
- Realizar 10 repeticiones de cada grupo muscular de 3 a 4 veces al día.
- Ejercicios:
- Evitar las elevaciones de la pierna recta (especialmente en pacientes con lesiones articulares).
- Flexión – Extensión de cadera: doblando la rodilla de la pierna afecta y deslizando el talón hacia la nalga tanto como sea posible. Cuando haya conseguido la máxima flexión, volver a poner la pierna recta.
- Rotación interna/externa: con la pierna recta realizar giros con los pies hacia dentro y hacia fuera. No forzar las rotaciones ( sobre todo tener precaución con la rotación interna ).
- Ejercicios circulatorios y de flexo – extensión del tobillo.
- Realizar cambios de posición frecuentes (sentarse/estirarse).
- Realizar contracciones isométricas de Cuádriceps e isquiotibiales, realizar contracciones simultáneas de ambos.
- Realizar contracciones isométricas de Abductores (cinta alrededor de los muslos y empujar hacia fuera).
- Realizar contracciones isométricas de Adductores (con una almohada entre los muslos).
- Realizar contracciones isométricas de Glúteos.
- En el momento que podamos sentarnos cómodamente, sin tensiones, podemos iniciar rodaje suave en bicicleta estática con el sillín alto para evitar flexión de la cadera >90 grados.
- No realizar movimientos bruscos.
- Limitación del rango de movilidad:
- Extensión : 10 grados.
- Flexión : 90 grados.
- Abducción: 30 grados.
- Adducción: 30 grados.
- Rotación interna en flexión: 20 grados.
- Rotación externa en flexión : 70 grados.
- RECUERDE: NO TODAS LAS ARTROSCOPIAS DE CADERAS SON IGULAES.
- Cada paciente evoluciona de forma diferente en función de la cirugía realizada, edad, el estado de salud previo y su
- capacidad para adaptarse a la Rehabilitación.
- Una complicación frecuente durante el programa de rehabilitación es la tendinitis del tendón del Psoas Iliaco. Cursa con dolor inguinal anterior y ocurre porque nos hemos excedido  en los ejercicios. En tal caso, debemos acudir al médico/fisioterapeuta para reconducir la rehabilitación.
- 3ª y 4ª SEMANAS
- Ir aumentando progresivamente la carga parcial con dos muletas de la pierna operada para conseguir soltar una muleta al final de la 3ª semana y sin muletas sobre la 4ª o 5ª semana.
- Frío local  durante 15min / varias veces al día. Nunca directamente sobre la piel.
- Todos los ejercicios deben realizarse en un rango de movilidad sin dolor.
- Realizar 10 repeticiones de cada grupo muscular de 3 a 4 veces al día.
- Continuar con ejercicios previos y añadir los siguientes:
- Puente con dos piernas (pelvis neutra): tumbado boca arriba con las rodillas flexionadas y los pies apoyados en el suelo paralelos entre sí, elevar las caderas.
- Ejercicios de extensión de rodilla: colocar una toalla enrollada (15 cm de diámetro) bajo la rodilla de la pierna afectada. Poner la pierna recta sin perder el contacto del muslo con el rollo
- Abducción de caderas: con las piernas rectas, desplazar la pierna afectada lateralmente tanto como sea posible para después volver a juntarlas.
- (sigue en el siguiente apartado de recomendaciones generales)
- RECOMENDACIONES GENERALES:
- Sentados en una silla, flexionar el cuerpo hacia delante progresivamente (teniendo en cuenta la tensión en la zona inguinal y no presencia de dolor).
- Bicicleta estática (10-15 min con mínima resistencia).
- Ejercicios en el agua, siempre que las heridas estén bien cicatrizadas y el entorno tenga fácil acceso (lo ideal es que el agua le llegue a la altura del pecho o cómo mínimo a la cintura):
- Caminar normalizando la marcha, talón – punta, lentamente para no hacer resistencia.
- Desplazarse lateralmente.
- Flexo-extensión de cadera, abducción de cadera y simular bicicleta suavemente.
- Limitación del rango de movilidad:
- Extensión : 20 grados.
- Flexión : 120 grados.
- Abducción: 45 grados.
- Adducción: 45 grados.
- Rotación interna en flexión: 30 grados.
- Rotación externa en flexión : 90 grados.`
