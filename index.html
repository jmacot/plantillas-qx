<!DOCTYPE html>
<html lang="es">
<head>
  <script>(function(){if(location.hostname==='localhost'||location.hostname==='127.0.0.1')return;var a=localStorage.getItem('cot_auth');if(!a||(Date.now()-parseInt(a))>86400000){localStorage.removeItem('cot_auth');window.location.replace('https://jmacot.github.io/');}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantillas COT</title>
  <!-- Favicon e iconos -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Plantillas QX">
  <meta name="theme-color" content="#1a3a5c">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #e8eef4;
      --border: #e2e8f0;
      --border-light: #e5e7eb;
      --accent: #1a3a5c;
      --accent-light: #eef2f7;
      --accent-hover: #14304f;
      --text: #222222;
      --text-muted: #555555;
      --text-light: #888888;
      --green: #16a34a;
      --green-light: #dcfce7;
      --amber: #c0540a;
      --amber-light: #fef3c7;
      --red: #dc2626;
      --red-light: #fee2e2;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --radius-sm: 8px;
      --radius: 16px;
      --radius-lg: 24px;
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg: #111827;
      --surface: #1f2937;
      --surface2: #283244;
      --border: #374151;
      --border-light: #4b5563;
      --text: #f1f5f9;
      --text-muted: #a8b8cc;
      --text-light: #64748b;
      --accent: #93c5fd;
      --accent-hover: #bae0ff;
      --accent-light: #1e3a5f;
      --green: #4ade80;
      --green-light: #14352a;
      --amber-light: #3b2a10;
      --red-light: #3b1010;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.15);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2);
      --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px 24px 10px;
      gap: 10px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes textFlash {
      0% { background-color: var(--accent-light); }
      100% { background-color: var(--surface2); }
    }

    /* ── BACK HOME ── */
    .back-home {
      position: fixed;
      top: 10px;
      left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: border-color 0.2s, color 0.2s;
      z-index: 100;
    }
    .back-home:hover { border-color: var(--accent); color: var(--accent); }

    /* ── HEADER PREMIUM ── */
    .app-header {
      background: linear-gradient(135deg, #0f2240 0%, #1a3a5c 50%, #234e77 100%);
      color: white;
      padding: 36px 32px 28px;
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(15,34,64,0.25);
      animation: fadeInUp 0.6s ease-out;
      text-align: center;
    }
    .app-header::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -40px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
    }
    .app-header::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: 15%;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.10) 0%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
    }
    [data-theme="dark"] .app-header {
      background: linear-gradient(135deg, #152238 0%, #1c2f4a 50%, #213656 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .app-header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.3rem, 3vw, 1.7rem);
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .app-header h1 svg {
      width: 28px;
      height: 28px;
      opacity: 0.85;
    }
    .app-header .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      z-index: 2;
      color: white;
    }
    .theme-toggle:hover {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.2);
    }

    /* ── CATEGORY PILLS ── */
    .cat-nav {
      flex-shrink: 0;
      animation: fadeInUp 0.6s ease-out 0.05s both;
    }
    .cat-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: 'Inter', Arial, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cat-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .cat-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: var(--shadow-sm);
    }
    [data-theme="dark"] .cat-pill.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .cat-pill .cat-count {
      font-size: 10px;
      opacity: 0.6;
      font-weight: 400;
    }

    /* ── SUB-CATEGORY PILLS (segunda fila) ── */
    .sub-pills {
      margin-top: 4px;
      padding-top: 2px;
    }
    .sub-pills.animate-in {
      animation: fadeInUp 0.3s ease-out both;
    }
    .sub-pills .cat-pill {
      font-size: 11px;
      padding: 5px 12px;
      border-style: dashed;
    }
    .sub-pills .cat-pill.active {
      border-style: solid;
    }

    /* ── CARD / FORM ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      flex-shrink: 0;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }
    .form-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,58,92,0.10);
    }
    [data-theme="dark"] .form-group input:focus,
    [data-theme="dark"] .form-group select:focus {
      box-shadow: 0 0 0 3px rgba(147,197,253,0.15);
    }

    /* ── SELECT DESTACADO ── */
    select#procedimiento {
      background: #d6e4f0;
      color: #1a3a5c;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      border-color: #b8cfdf;
      transition: background 0.2s, box-shadow 0.2s;
      padding-right: 32px;
    }
    select#procedimiento:hover {
      background: #c5d9ec;
      box-shadow: var(--shadow);
    }
    select#procedimiento:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    [data-theme="dark"] select#procedimiento {
      background: #1e3a5f;
      color: #93c5fd;
      border-color: #2d5a8a;
    }
    select#procedimiento option {
      background: var(--surface);
      color: var(--text);
      padding: 4px 16px;
    }
    select#urgDiagnostico {
      background: #f5ddd5;
      color: #8b4532;
      font-weight: 600;
      border-color: #e8c4b8;
    }
    select#urgDiagnostico:hover {
      background: #f0cfc5;
      box-shadow: var(--shadow);
    }
    [data-theme="dark"] select#urgDiagnostico {
      background: #2d1f1a;
      color: #e8977f;
      border-color: #4a2f24;
    }

    /* ── BUTTONS ── */
    .btn-danger {
      background: transparent;
      color: #dc2626;
      border: 1.5px solid #dc2626;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', Arial, sans-serif;
    }
    .btn-danger:hover { background: #dc2626; color: white; }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1.5px solid currentColor;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', Arial, sans-serif;
    }
    .btn-copy svg { width: 14px; height: 14px; }
    .btn-copy:hover { transform: translateY(-1px); }
    .btn-copy.blue { color: var(--accent); }
    .btn-copy.blue:hover { background: var(--accent); color: white; }
    .btn-copy.green { color: var(--green); }
    .btn-copy.green:hover { background: var(--green); color: white; }

    /* ── PANELS ── */
    .panels-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      flex: 1;
      min-height: 0;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .panel:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: rgba(26,58,92,0.04);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .panel.panel-green .panel-header {
      background: rgba(22,163,74,0.04);
    }
    [data-theme="dark"] .panel-header {
      background: rgba(147,197,253,0.06);
    }
    [data-theme="dark"] .panel.panel-green .panel-header {
      background: rgba(74,222,128,0.06);
    }
    .panel-title {
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title svg {
      width: 18px;
      height: 18px;
      opacity: 0.75;
      flex-shrink: 0;
    }
    .panel.panel-green .panel-title {
      color: var(--green);
    }
    .panel textarea {
      flex: 1;
      border: none;
      outline: none;
      background: var(--surface2);
      padding: 14px 18px;
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text);
      resize: none;
      overflow-y: auto;
      transition: background-color 0.3s;
    }
    .panel textarea::selection {
      background: rgba(26,58,92,0.15);
    }
    [data-theme="dark"] .panel textarea::selection {
      background: rgba(147,197,253,0.2);
    }
    .panel textarea.flash {
      animation: textFlash 0.4s ease-out;
    }
    .panel textarea::-webkit-scrollbar { width: 6px; }
    .panel textarea::-webkit-scrollbar-track { background: transparent; }
    .panel textarea::-webkit-scrollbar-thumb {
      background: var(--accent-light);
      border-radius: 3px;
    }
    .panel textarea::-webkit-scrollbar-thumb:hover { background: var(--text-light); }

    /* ── COPY TOOLTIP ── */
    .copy-wrap { position: relative; }
    .copy-tooltip {
      position: absolute;
      background: var(--accent);
      color: white;
      padding: 3px 12px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      top: -32px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }
    .copy-tooltip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FOOTER ── */
    .app-footer {
      text-align: center;
      flex-shrink: 0;
      padding: 2px 0;
    }
    .app-footer span {
      font-size: 0.7rem;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    /* ── TOAST ── */
    .toast-banner {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #7c3aed;
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', Arial, sans-serif;
      box-shadow: 0 8px 32px rgba(124,58,237,0.30);
      z-index: 9999;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast-banner.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-banner.toast-green {
      background: #16a34a;
      box-shadow: 0 8px 32px rgba(22,163,74,0.30);
    }

    /* ── MODULE NAV ── */
    .modulo-nav {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      animation: fadeInUp 0.6s ease-out 0.03s both;
    }
    .modulo-pill {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--surface);
      font-family: 'Inter', Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .modulo-pill svg { width: 20px; height: 20px; opacity: 0.7; flex-shrink: 0; }
    .modulo-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .modulo-pill.active[data-modulo="quirofano"] {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 4px 16px rgba(26,58,92,0.25);
    }
    .modulo-pill.active[data-modulo="urgencias"] {
      background: #e07a5f;
      border-color: #e07a5f;
      color: white;
      box-shadow: 0 4px 16px rgba(224,122,95,0.25);
    }
    [data-theme="dark"] .modulo-pill.active[data-modulo="quirofano"] {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    [data-theme="dark"] .modulo-pill.active[data-modulo="urgencias"] {
      background: #2d1f1a;
      border-color: #e8977f;
      color: #e8977f;
    }
    .modulo-pill.active svg { opacity: 1; }

    /* ── URGENCIAS COMPACT FORM ── */
    #seccion-urgencias .card { padding: 10px 14px; }
    #seccion-urgencias .form-row { gap: 10px; align-items: end; }
    #seccion-urgencias .form-group label {
      font-size: 10px; margin-bottom: 2px;
    }
    #seccion-urgencias .form-group input,
    #seccion-urgencias .form-group select {
      padding: 7px 10px; font-size: 13px;
    }
    #seccion-urgencias .urg-sexo-toggle { padding: 2px; }
    #seccion-urgencias .urg-sexo-btn { padding: 7px 10px; font-size: 12px; gap: 4px; }
    #seccion-urgencias .urg-sexo-btn svg { width: 14px; height: 14px; }
    #seccion-urgencias .btn-danger { padding: 7px 14px; font-size: 12px; }

    /* ── URGENCIAS ACCENT OVERRIDES ── */
    .panels-grid-3 .panel textarea {
      flex: none;
      min-height: 80px;
      overflow-y: hidden;
    }
    .panel.panel-urg .panel-header { background: rgba(224,122,95,0.05); }
    .panel.panel-urg .panel-title { color: #e07a5f; }
    [data-theme="dark"] .panel.panel-urg .panel-header { background: rgba(232,151,127,0.06); }
    [data-theme="dark"] .panel.panel-urg .panel-title { color: #e8977f; }
    .panel.panel-amber .panel-header { background: rgba(192,84,10,0.04); }
    .panel.panel-amber .panel-title { color: var(--amber); }
    [data-theme="dark"] .panel.panel-amber .panel-header { background: rgba(251,191,36,0.06); }
    [data-theme="dark"] .panel.panel-amber .panel-title { color: #fbbf24; }

    /* ── URGENCIAS SEXO TOGGLE ── */
    .urg-sexo-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }
    .urg-sexo-btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .urg-sexo-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .urg-sexo-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── URGENCIAS COPY ROW ── */
    .urg-copy-row {
      display: flex;
      justify-content: center;
      padding: 8px 0;
      animation: fadeInUp 0.6s ease-out 0.25s both;
    }
    .btn-copy.urg { color: #e07a5f; border-color: #e07a5f; padding: 8px 24px; font-size: 13px; }
    .btn-copy.urg:hover { background: #e07a5f; color: white; }
    [data-theme="dark"] .btn-copy.urg { color: #e8977f; border-color: #e8977f; }
    [data-theme="dark"] .btn-copy.urg:hover { background: #e8977f; color: #1f2937; }

    /* ── 3-COLUMN PANELS GRID ── */
    .panels-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      align-items: start;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    /* ── SECTION VISIBILITY ── */
    .seccion { display: none; }
    .seccion.active { display: contents; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      html, body { height: auto; overflow: auto; }
      #app { height: auto; padding: 10px 14px 20px; }
      .app-header { padding: 28px 20px 22px; border-radius: var(--radius); }

      .form-group { width: 100% !important; flex: 1 !important; }

      /* Quirófano: Cirujano + Ayudante lado a lado */

        display: grid;
        grid-template-columns: 1fr 1fr;

        display: flex;
        justify-content: center;
      }

      .panels-grid, .panels-grid-3 { grid-template-columns: 1fr; flex: none; }
      .panel textarea { min-height: 200px; }
      .theme-toggle { width: 34px; height: 34px; font-size: 1rem; top: 8px; right: 8px; }
      .modulo-nav { gap: 4px; }
      .modulo-pill { padding: 9px 8px; font-size: 11px; gap: 4px; }
      .modulo-pill svg { width: 14px; height: 14px; }
      #seccion-urgencias .form-group { width: 100% !important; flex: none !important; }

      .urg-sexo-toggle { min-width: 100%; }
      .urg-sexo-btn { padding: 8px 10px; font-size: 12px; }
    }

</head>

  function hoy() {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = String(d.getFullYear()).slice(-2);
    return `${dd}/${mm}/${yy}`;
  }

  function cargarPlantilla() {
    const proc = document.getElementById('procedimiento').value;
    const doc  = (document.getElementById('doctor').value.trim() || 'DOCTOR').toUpperCase();
    const ayu  = (document.getElementById('ayudante').value.trim() || 'AYUDANTE').toUpperCase();
    const lado = document.getElementById('lateralidad').value;
    if (!proc) return;
    const t = obtenerPlantillas(doc, ayu, lado);
    const datos = t[proc];
    if (!datos) return;
    const hojaEl = document.getElementById('hojaOperatoria');
    const trataEl = document.getElementById('tratamientoAlta');
    // Reemplazar --- residuales con lateralidad abreviada
    // Reemplazar "---." → "derecho." y "---" sueltos → "derecho"
    const ladoStr = lado === 'D' ? 'derecho' : lado === 'I' ? 'izquierdo' : '';
    function reemplazarLado(txt) {
      if (!ladoStr) return txt;
      return txt.replace(/---\./g, ladoStr + '.').replace(/---/g, ladoStr);
    }
    hojaEl.value = reemplazarLado(datos.hoja);
    trataEl.value = reemplazarLado(datos.tratamiento);
    // Flash animation
    hojaEl.classList.remove('flash');
    trataEl.classList.remove('flash');
    void hojaEl.offsetWidth;
    hojaEl.classList.add('flash');
    trataEl.classList.add('flash');
  }

  function limpiar() {
    document.getElementById('procedimiento').value = '';
    document.getElementById('doctor').value = '';
    document.getElementById('ayudante').value = '';
    document.getElementById('lateralidad').value = '';
    document.getElementById('hojaOperatoria').value = '';
    document.getElementById('tratamientoAlta').value = '';
    activeCat = null;
    activeRegion = null;
    document.querySelectorAll('#regionPills .cat-pill').forEach(p => p.classList.remove('active'));
    const subContainer = document.getElementById('subCatPills');
    subContainer.style.display = 'none';
    subContainer.innerHTML = '';
    const sel = document.getElementById('procedimiento');
    sel.disabled = true;
    sel.innerHTML = '<option value="">— Seleccione categoría primero —</option>';
  }

  function copiarTexto(id) {
    const text = document.getElementById(id).value;
    if (!text) return;
    const msg = id === 'tratamientoAlta'
      ? '✓  Tratamiento copiado al portapapeles'
      : '✓  Hoja operatoria copiada al portapapeles';
    navigator.clipboard.writeText(text).then(() => {
      mostrarToast(msg, 'green');
    }).catch(() => {
      const ta = Object.assign(document.createElement('textarea'), { value: text });
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      mostrarToast(msg, 'green');
    });
  }

  function mostrarToast(msg, variant) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast-banner' + (variant ? ' toast-' + variant : '');
    void t.offsetWidth;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.classList.remove('show'); }, 2200);
  }

  function renderRegionPills() {
    const container = document.getElementById('regionPills');
    container.innerHTML = REGIONES.map(region => {
      const total = region.catIds.reduce((sum, catId) => {
        const cat = CATEGORIAS.find(c => c.id === catId);
        return sum + (cat ? cat.procs.length : 0);
      }, 0);
      return `<button class="cat-pill" data-region="${region.id}" onclick="selectRegion('${region.id}')">
        ${region.label} <span class="cat-count">${total}</span>
      </button>`;
    }).join('');
  }

  function selectRegion(regionId) {
    const region = REGIONES.find(r => r.id === regionId);
    if (!region) return;
    activeRegion = regionId;
    document.querySelectorAll('#regionPills .cat-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.region === regionId);
    });
    const subContainer = document.getElementById('subCatPills');
    if (region.catIds.length === 1) {
      subContainer.style.display = 'none';
      subContainer.innerHTML = '';
      selectCategoria(region.catIds[0]);
    } else {
      const allCount = region.catIds.reduce((s, id) => {
        const c = CATEGORIAS.find(x => x.id === id);
        return s + (c ? c.procs.length : 0);
      }, 0);
      subContainer.innerHTML =
        `<button class="cat-pill active" data-cat="all" onclick="filterSubCat('all')">
          Todas <span class="cat-count">${allCount}</span>
        </button>` +
        region.catIds.map(catId => {
          const cat = CATEGORIAS.find(c => c.id === catId);
          if (!cat) return '';
          return `<button class="cat-pill" data-cat="${cat.id}" onclick="filterSubCat('${cat.id}')">
            ${cat.label} <span class="cat-count">${cat.procs.length}</span>
          </button>`;
        }).join('');
      subContainer.style.display = 'flex';
      subContainer.classList.remove('animate-in');
      void subContainer.offsetWidth;
      subContainer.classList.add('animate-in');
      populateAllProcs();
    }
  }

  function populateAllProcs() {
    const region = REGIONES.find(r => r.id === activeRegion);
    if (!region) return;
    const allProcs = region.catIds.flatMap(catId => {
      const cat = CATEGORIAS.find(c => c.id === catId);
      return cat ? cat.procs : [];
    });
    const sel = document.getElementById('procedimiento');
    sel.disabled = false;
    sel.innerHTML = '<option value="">— Seleccione procedimiento —</option>' +
      [...allProcs].sort((a, b) => a.label.localeCompare(b.label, 'es'))
        .map(p => `<option value="${p.value}">${p.label}</option>`).join('');
    sel.value = '';
    activeCat = null;
    cargarPlantilla();
  }

  function filterSubCat(catId) {
    document.querySelectorAll('#subCatPills .cat-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.cat === catId);
    });
    if (catId === 'all') {
      populateAllProcs();
    } else {

  function selectCategoria(catId) {

  const btnTheme = document.getElementById('btn-theme');

  function applyTheme(dark) {
    if (dark) {
      document.documentElement.setAttribute('data-theme', 'dark');
      btnTheme.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      btnTheme.textContent = '🌙';
    }
  }

  function getAutoTheme() {
    const hour = new Date().getHours();
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    return (hour >= 21 || hour < 7 || prefersDark) ? 'dark' : 'light';
  }

  function initTheme() {
    const saved = localStorage.getItem('pqx-theme');
    const savedDate = localStorage.getItem('pqx-theme-date');
    const today = new Date().toDateString();
    if (saved && savedDate === today) {
      applyTheme(saved === 'dark');
    } else {
      localStorage.removeItem('pqx-theme');
      localStorage.removeItem('pqx-theme-date');
      applyTheme(getAutoTheme() === 'dark');
    }
  }

  btnTheme.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
    localStorage.setItem('pqx-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('pqx-theme-date', new Date().toDateString());
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    const saved = localStorage.getItem('pqx-theme');
    const savedDate = localStorage.getItem('pqx-theme-date');
    if (!saved || savedDate !== new Date().toDateString()) {
      applyTheme(getAutoTheme() === 'dark');
    }
  });

  function cargarPlantillaUrg() {
    const diag = document.getElementById('urgDiagnostico').value;
    const sexoBtn = document.querySelector('.urg-sexo-btn.active');
    const sexo = sexoBtn ? sexoBtn.dataset.sexo : '';
    const edad = document.getElementById('urgEdad').value;
    const lado = document.getElementById('urgLado').value;
    const tipo = document.getElementById('urgTipo').value;
    const raw1 = document.getElementById('urgCot1').value.trim();
    const raw2 = document.getElementById('urgCot2').value.trim();
    const cot = urgCotLabel(raw1 || 'COT', raw2);
    const acudo = urgAcudo(raw1, raw2);
    const parte = urgParte(raw1, raw2);

    const anamEl = document.getElementById('urgAnamnesis');
    const expoEl = document.getElementById('urgExploracion');
    const planEl = document.getElementById('urgPlan');

    function resetUrg() {
      [anamEl, expoEl, planEl].forEach(el => { el.value = ''; el.style.height = ''; });
    }
    if (!diag) { resetUrg(); return; }

    const t = URG_PLANTILLAS[diag];
    if (!t) return;

    const e = edad || '___';
    anamEl.value = t.anamnesis(cot, acudo, parte, sexo, e, lado);
    expoEl.value = t.exploracion(cot, acudo, parte, sexo, e, lado);

    // Determinar plan según tipo
    if (URG_SIEMPRE_QX.includes(diag)) {
      planEl.value = t.plan_quirurgico(cot, acudo, parte, sexo, e, lado);
    } else if (URG_CON_TIPO.includes(diag) && tipo === 'Q') {
      planEl.value = t.plan_quirurgico(cot, acudo, parte, sexo, e, lado);
    } else {
      planEl.value = t.plan_conservador(cot, acudo, parte, sexo, e, lado);
    }

    [anamEl, expoEl, planEl].forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    });
  }

  function copiarTodoUrg() {
    const a = document.getElementById('urgAnamnesis').value;
    const e = document.getElementById('urgExploracion').value;
    const p = document.getElementById('urgPlan').value;
    const todo = [a, e, p].filter(Boolean).join('\n\n');
    if (!todo) return;
    navigator.clipboard.writeText(todo).then(() => {
      mostrarToast('✓  Informe urgencias copiado al portapapeles', 'green');
    }).catch(() => {
      // Fallback para contextos sin permisos de clipboard
      const ta = Object.assign(document.createElement('textarea'), { value: todo });
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      mostrarToast('✓  Informe urgencias copiado al portapapeles', 'green');
    });
  }

EJERCICIOS POSTOPERATORIOS
- Encamado (primeros días tras intervención)
- Mover el tobillo
- Objetivo: Facilitar el retorno venoso y reducir la inflamación.
- Cómo hacerlo: Acostado(a) en la cama, mueva ambos tobillos hacia arriba y hacia abajo repetidamente.
- Frecuencia: Realice el mayor número de veces posible durante el día.
- Contracción del cuádriceps
- Objetivo: Fortalecer el músculo del muslo y mejorar la extensión de la rodilla.
- Cómo hacerlo: Coloque una toalla enrollada debajo de la rodilla. Contraiga el cuádriceps (músculo del muslo) intentando "aplastar" la toalla contra la cama.
- Duración: Mantenga la contracción durante 5 segundos.
- Repeticiones: Hágalo de 10 a 20 veces, 2-3 veces al día.
- Elevación de pierna recta
- Objetivo: Fortalecer los músculos de la pierna operada.
- Cómo hacerlo: Con la pierna sana doblada, mantenga la pierna operada recta, elévela unos 20-30 cm de la cama, mantenga por 5 segundos y bájela lentamente.
- Repeticiones: Realice de 100 a 300 elevaciones a lo largo del día.
- Flexión de rodilla en cama
- Objetivo: Mejorar el rango de movimiento de la rodilla.
- Cómo hacerlo: Deslice el talón de la pierna operada hacia los glúteos doblando la rodilla. Mantenga la flexión máxima por 5 segundos y luego vuelva a estirar la pierna.
- Repeticiones: Realice de 10 a 15 veces, 2-3 veces al día.
- Ejercicios Sentado(a) en Silla
- Flexión de rodilla
- Objetivo: Mejorar la flexión de la rodilla.
- Cómo hacerlo: Sentado(a) en el borde de una silla, con el pie en el suelo, flexione la rodilla operada lo máximo posible. Ayúdese con la pierna sana para aumentar la flexión. Mantenga la posición durante 5-10 segundos y luego estire la pierna.
- Repeticiones: Hágalo de 10 a 15 veces, 2-3 veces al día.
- Extensión de rodilla
- Objetivo: Mejorar la extensión completa de la rodilla.
- Cómo hacerlo: Sentado(a) en el borde de la silla, estire la pierna operada lo máximo posible. Ayúdese con la pierna sana para lograr una extensión máxima. Mantenga la posición durante 5-10 segundos y luego vuelva a la posición inicial.
- Repeticiones: Realice de 10 a 15 veces, 2-3 veces al día.
- Extensión pasiva de rodilla
- Objetivo: Mejorar la movilidad y reducir la rigidez.
- Cómo hacerlo: Coloque una silla frente a usted y extienda la pierna operada sobre ella, dejando que la rodilla se relaje y se extienda de forma pasiva durante 5-10 minutos.
- Frecuencia: Hágalo después de los ejercicios de flexión-extensión.
- Potenciación de aductores
- Objetivo: Fortalecer los músculos aductores del muslo.
- Cómo hacerlo: Coloque un cojín entre los muslos y presione hacia el centro con ambas piernas.
- Duración: Mantenga la presión por 10 segundos.
- Repeticiones: Realice 10 veces, 2-3 veces al día.

CAMINAR CON MULETAS
- Primer paso: Avance las muletas.
- Segundo paso: Adelante la pierna operada (por ejemplo, la derecha) hasta el nivel de las muletas.
- Tercer paso: Avance la pierna sana.
- Uso de una sola muleta
- Cuando pase a usar una sola muleta, esta debe estar en el lado contrario a la pierna operada, avanzando a la vez que la pierna intervenida.

CAMINAR CON ANDADOR
- Objetivo: Proporcionar mayor estabilidad y soporte al caminar durante la fase de recuperación.
- Cómo hacerlo:
- Posicionamiento inicial: Coloque el andador frente a usted, con las cuatro patas del andador firmemente apoyadas en el suelo. Asegúrese de que el andador esté bien ajustado a su altura para evitar tensiones en los hombros y brazos.
- Paso 1 - Mover el andador: Desplace el andador un paso hacia adelante, asegurándose de que permanezca siempre a una distancia cómoda y segura (aproximadamente un brazo de distancia).
- Paso 2 - Mover la pierna operada: Avance la pierna operada (o la más débil) hacia el centro del andador, colocándola entre las patas delanteras del andador. De esta manera, se asegura de que la mayor parte del peso se distribuye hacia el andador y no hacia su pierna.
- Paso 3 - Mover la pierna sana: Luego, avance la pierna sana hasta alcanzar la misma posición que la pierna operada, o más allá de esta si se siente seguro(a). Asegúrese de mantener un ritmo constante y equilibrado.
- Repetir el ciclo: Repita este ciclo de movimientos mientras camina, manteniendo siempre el andador delante de usted y utilizando sus brazos para apoyarse si es necesario.
- Consejos:
- Evite inclinarse demasiado hacia adelante o hacia atrás al caminar. Mantenga una postura erguida para reducir el riesgo de caídas.
- Avance el andador siempre antes de dar el paso con la pierna operada, para que sirva de soporte.
- No se apresure. Camine a un ritmo que le permita sentirse seguro(a) y estable.

SUBIR Y BAJAR ESCALERAS
- Para subir escaleras:
- Coloque la pierna sana en el escalón superior.
- Apóyese en las muletas y la pierna sana para levantar la pierna operada.
- Para bajar escaleras:
- Coloque las muletas en el escalón inferior.
- Baje la pierna operada.
- Luego, baje la pierna sana.

CUIDADOS DE LA HERIDA
- Mantenga la herida limpia y seca. Cambie los apósitos según lo indicado por su médico.

- Si apareciera fiebre (>38º), dolor intenso que no se alivia con analgésicos, o alteraciones en la sensibilidad y/o la coloración de la extremidad operada acudirá a Urgencias.

SIGA LAS SIGUIENTES RECOMENDACIONES DOMICILIARIAS:
- 1ª y 2ª SEMANAS
- Carga parcial con dos muletas.
- Frío local  durante 15min / varias veces al día. Nunca directamente sobre la piel.
- Todos los ejercicios deben realizarse en un rango de movilidad sin dolor.
- Realizar 10 repeticiones de cada grupo muscular de 3 a 4 veces al día.

Ejercicios:
- Evitar las elevaciones de la pierna recta (especialmente en pacientes con lesiones articulares).
- Flexión – Extensión de cadera: doblando la rodilla de la pierna afecta y deslizando el talón hacia la nalga tanto como sea posible. Cuando haya conseguido la máxima flexión, volver a poner la pierna recta.
- Rotación interna/externa: con la pierna recta realizar giros con los pies hacia dentro y hacia fuera. No forzar las rotaciones ( sobre todo tener precaución con la rotación interna ).
- Ejercicios circulatorios y de flexo – extensión del tobillo.
- Realizar cambios de posición frecuentes (sentarse/estirarse).
- Realizar contracciones isométricas de Cuádriceps e isquiotibiales, realizar contracciones simultáneas de ambos.
- Realizar contracciones isométricas de Abductores (cinta alrededor de los muslos y empujar hacia fuera).
- Realizar contracciones isométricas de Adductores (con una almohada entre los muslos).
- Realizar contracciones isométricas de Glúteos.
- En el momento que podamos sentarnos cómodamente, sin tensiones, podemos iniciar rodaje suave en bicicleta estática con el sillín alto para evitar flexión de la cadera >90 grados.
- No realizar movimientos bruscos.

Limitación del rango de movilidad:
- Extensión : 10 grados.
- Flexión : 90 grados.
- Abducción: 30 grados.
- Adducción: 30 grados.
- Rotación interna en flexión: 20 grados.
- Rotación externa en flexión : 70 grados.

RECUERDE: NO TODAS LAS ARTROSCOPIAS DE CADERAS SON IGUALES.
- Cada paciente evoluciona de forma diferente en función de la cirugía realizada, edad, el estado de salud previo y su
- capacidad para adaptarse a la Rehabilitación.
- Una complicación frecuente durante el programa de rehabilitación es la tendinitis del tendón del Psoas Iliaco. Cursa con dolor inguinal anterior y ocurre porque nos hemos excedido  en los ejercicios. En tal caso, debemos acudir al médico/fisioterapeuta para reconducir la rehabilitación.
- 3ª y 4ª SEMANAS
- Ir aumentando progresivamente la carga parcial con dos muletas de la pierna operada para conseguir soltar una muleta al final de la 3ª semana y sin muletas sobre la 4ª o 5ª semana.
- Frío local  durante 15min / varias veces al día. Nunca directamente sobre la piel.
- Todos los ejercicios deben realizarse en un rango de movilidad sin dolor.
- Realizar 10 repeticiones de cada grupo muscular de 3 a 4 veces al día.

Continuar con ejercicios previos y añadir los siguientes:
- Puente con dos piernas (pelvis neutra): tumbado boca arriba con las rodillas flexionadas y los pies apoyados en el suelo paralelos entre sí, elevar las caderas.
- Ejercicios de extensión de rodilla: colocar una toalla enrollada (15 cm de diámetro) bajo la rodilla de la pierna afectada. Poner la pierna recta sin perder el contacto del muslo con el rollo
- Abducción de caderas: con las piernas rectas, desplazar la pierna afectada lateralmente tanto como sea posible para después volver a juntarlas.
- (sigue en el siguiente apartado de recomendaciones generales)

RECOMENDACIONES GENERALES:
- Sentados en una silla, flexionar el cuerpo hacia delante progresivamente (teniendo en cuenta la tensión en la zona inguinal y no presencia de dolor).
- Bicicleta estática (10-15 min con mínima resistencia).
- Ejercicios en el agua, siempre que las heridas estén bien cicatrizadas y el entorno tenga fácil acceso (lo ideal es que el agua le llegue a la altura del pecho o cómo mínimo a la cintura):
- Caminar normalizando la marcha, talón – punta, lentamente para no hacer resistencia.
- Desplazarse lateralmente.
- Flexo-extensión de cadera, abducción de cadera y simular bicicleta suavemente.

Limitación del rango de movilidad:
- Extensión : 20 grados.
- Flexión : 120 grados.
- Abducción: 45 grados.
- Adducción: 45 grados.
- Rotación interna en flexión: 30 grados.
- Rotación externa en flexión : 90 grados.`
},
