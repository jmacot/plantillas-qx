  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e8edf4;
      --surface: rgba(255, 255, 255, 0.55);
      --surface-solid: #ffffff;
      --surface2: rgba(255, 255, 255, 0.35);
      --border: rgba(255, 255, 255, 0.5);
      --border-light: rgba(255, 255, 255, 0.6);
      --accent: #0284c7; --accent-light: rgba(224, 242, 254, 0.6); --accent-hover: #0369a1;
      --text: #1a1a2e; --text-muted: #555666; --text-light: #8890a4;
      --sky: #0284c7; --sky-light: rgba(224, 242, 254, 0.6);
      --violet: #7c3aed; --violet-light: rgba(237, 233, 254, 0.6);
      --emerald: #10b981; --emerald-light: rgba(209, 250, 229, 0.6);
      --green: #10b981; --green-light: rgba(209, 250, 229, 0.6);
      --amber: #f59e0b; --amber-light: rgba(254, 243, 199, 0.6);
      --red: #ef4444; --red-light: rgba(254, 226, 226, 0.6);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.04);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.08);
      --radius-sm: 10px; --radius: 16px; --radius-lg: 24px;
      --glass-blur: 16px;
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg: #111827;
      --surface: rgba(31, 41, 55, 0.6);
      --surface-solid: #1f2937;
      --surface2: rgba(40, 50, 68, 0.5);
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.1);
      --accent: #38bdf8; --accent-light: rgba(2, 132, 199, 0.15); --accent-hover: #7dd3fc;
      --text: #f1f5f9; --text-muted: #a8b8cc; --text-light: #64748b;
      --sky: #38bdf8; --sky-light: rgba(2, 132, 199, 0.15);
      --violet: #a78bfa; --violet-light: rgba(124, 58, 237, 0.15);
      --emerald: #6ee7b7; --emerald-light: rgba(16, 185, 129, 0.15);
      --green: #6ee7b7; --green-light: rgba(16, 185, 129, 0.15);
      --amber: #fbbf24; --amber-light: rgba(245, 158, 11, 0.15);
      --red: #f87171; --red-light: rgba(239, 68, 68, 0.15);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.15);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.3);
    }

    html { scroll-behavior: smooth; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .skip-link {
      position: absolute; top: -100px; left: 16px;
      background: var(--ink, var(--text, #0f172a)); color: var(--bg, #fff);
      padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 500; z-index: 1000;
      text-decoration: none; transition: top 0.2s;
    }
    .skip-link:focus { top: 16px; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Source Sans 3', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── MESH GRADIENT ANIMADO ── */
    .mesh-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; background: var(--bg); }
    .mesh-orb { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
    .mesh-orb-1 { width: 50vw; height: 50vw; top: 10%; left: -10%; background: rgba(2,132,199,0.22); animation: orb1 18s ease-in-out infinite; }
    .mesh-orb-2 { width: 45vw; height: 45vw; top: 40%; right: -15%; background: rgba(124,58,237,0.18); animation: orb2 22s ease-in-out infinite; }
    .mesh-orb-3 { width: 40vw; height: 40vw; bottom: -5%; left: 30%; background: rgba(16,185,129,0.15); animation: orb3 20s ease-in-out infinite; }
    .mesh-orb-4 { width: 35vw; height: 35vw; top: 60%; left: 10%; background: rgba(245,158,11,0.10); animation: orb4 24s ease-in-out infinite; }
    .mesh-orb-5 { width: 30vw; height: 30vw; top: 5%; right: 20%; background: rgba(239,68,68,0.08); animation: orb5 19s ease-in-out infinite; }
    @keyframes orb1 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(15vw,10vh) scale(1.1); } 66% { transform: translate(-5vw,20vh) scale(0.95); } }
    @keyframes orb2 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-20vw,-10vh) scale(1.05); } 66% { transform: translate(5vw,15vh) scale(1.1); } }
    @keyframes orb3 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(10vw,-15vh) scale(1.08); } 66% { transform: translate(-15vw,-5vh) scale(0.92); } }
    @keyframes orb4 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20vw,-10vh) scale(1.15); } }
    @keyframes orb5 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-15vw,15vh) scale(1.1); } }
    .mesh-dots { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(circle, var(--text-light, #888) 0.5px, transparent 0.5px); background-size: 28px 28px; opacity: 0.05; }
    [data-theme="dark"] .mesh-orb-1 { background: rgba(2,132,199,0.10); }
    [data-theme="dark"] .mesh-orb-2 { background: rgba(124,58,237,0.08); }
    [data-theme="dark"] .mesh-orb-3 { background: rgba(16,185,129,0.06); }
    [data-theme="dark"] .mesh-orb-4 { background: rgba(245,158,11,0.05); }
    [data-theme="dark"] .mesh-orb-5 { background: rgba(239,68,68,0.04); }
    [data-theme="dark"] .mesh-dots { opacity: 0.02; }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px 24px 10px;
      gap: 10px;
      max-width: 1500px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes textFlash {
      0% { background-color: var(--accent-light); }
      100% { background-color: var(--surface2); }
    }
    @keyframes focusPulse {
      0% { box-shadow: 0 0 0 0 rgba(2,132,199,0.25); }
      70% { box-shadow: 0 0 0 6px rgba(2,132,199,0); }
      100% { box-shadow: 0 0 0 0 rgba(2,132,199,0); }
    }
    @keyframes focusPulseDark {
      0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.3); }
      70% { box-shadow: 0 0 0 6px rgba(56,189,248,0); }
      100% { box-shadow: 0 0 0 0 rgba(56,189,248,0); }
    }

    /* ── BACK HOME ── */
    .back-home {
      position: fixed; top: 10px; left: 10px;
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'Source Code Pro', monospace; font-size: 11px; letter-spacing: 0.05em;
      color: var(--text-muted); text-decoration: none;
      padding: 6px 12px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: var(--transition); z-index: 100;
    }
    .back-home:hover { border-color: var(--accent); color: var(--accent); }

    /* ── HEADER PREMIUM ── */

    /* ── DOT GRID + GLOWS ── */
    .hero-dot-grid { display: none; }
    .hero-glow { position: absolute; border-radius: 50%; filter: blur(50px); z-index: 0; animation: glowPulse 6s ease-in-out infinite; }
    .hero-glow-1 { top: -80px; right: -30px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(56,189,248,0.35) 0%, transparent 70%); }
    .hero-glow-2 { bottom: -60px; left: 15%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, transparent 70%); animation-delay: 3s; }
    @keyframes glowPulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }

    /* ── SKY TOGGLE ── */
    .sky-toggle { --toggle-size: 20px; position: absolute; top: 12px; right: 12px; z-index: 10; font-size: var(--toggle-size); }
    .sky-toggle *, .sky-toggle *::before, .sky-toggle *::after { box-sizing: border-box; margin: 0; padding: 0; font-size: var(--toggle-size); }
    .sky-toggle input { display: none; }
    .sky-toggle__container { width: 5.625em; height: 2.5em; background-color: #3D7EAE; border-radius: 6.25em; overflow: hidden; cursor: pointer; box-shadow: 0em -0.062em 0.062em rgba(0,0,0,0.25), 0em 0.062em 0.125em rgba(255,255,255,0.94); transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); position: relative; }
    .sky-toggle__container::before { content: ""; position: absolute; z-index: 1; inset: 0; box-shadow: 0em 0.05em 0.187em rgba(0,0,0,0.25) inset; border-radius: 6.25em; }
    .sky-toggle__circle { width: 3.375em; height: 3.375em; background-color: rgba(255,255,255,0.1); position: absolute; left: calc((3.375em - 2.5em) / 2 * -1); top: calc((3.375em - 2.5em) / 2 * -1); border-radius: 6.25em; box-shadow: inset 0 0 0 3.375em rgba(255,255,255,0.1), 0 0 0 0.625em rgba(255,255,255,0.1), 0 0 0 1.25em rgba(255,255,255,0.1); display: flex; transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17); pointer-events: none; }
    .sky-toggle__sun-moon { pointer-events: auto; position: relative; z-index: 2; width: 2.125em; height: 2.125em; margin: auto; border-radius: 6.25em; background-color: #ECCA2F; box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset; filter: drop-shadow(0.062em 0.125em 0.125em rgba(0,0,0,0.25)); overflow: hidden; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); }
    .sky-toggle__moon { transform: translateX(100%); width: 100%; height: 100%; background-color: #C4C9D1; border-radius: inherit; box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #969696 inset; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); position: relative; }
    .sky-toggle__spot { position: absolute; top: 0.75em; left: 0.312em; width: 0.75em; height: 0.75em; border-radius: 6.25em; background-color: #959DB1; box-shadow: 0em 0.0312em 0.062em rgba(0,0,0,0.25) inset; }
    .sky-toggle__spot:nth-of-type(2) { width: 0.375em; height: 0.375em; top: 0.937em; left: 1.375em; }
    .sky-toggle__spot:nth-of-type(3) { width: 0.25em; height: 0.25em; top: 0.312em; left: 0.812em; }
    .sky-toggle__clouds { width: 1.25em; height: 1.25em; background-color: #F3FDFF; border-radius: 6.25em; position: absolute; bottom: -0.625em; left: 0.312em; box-shadow: 0.937em 0.312em #F3FDFF, -0.312em -0.312em #AACADF, 1.437em 0.375em #F3FDFF, 0.5em -0.125em #AACADF, 2.187em 0 #F3FDFF, 1.25em -0.062em #AACADF, 2.937em 0.312em #F3FDFF, 2em -0.312em #AACADF, 3.625em -0.062em #F3FDFF, 2.625em 0em #AACADF, 4.5em -0.312em #F3FDFF, 3.375em -0.437em #AACADF, 4.625em -1.75em 0 0.437em #F3FDFF, 4em -0.625em #AACADF, 4.125em -2.125em 0 0.437em #AACADF; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); }
    .sky-toggle__stars { position: absolute; color: #fff; top: -100%; left: 0.312em; width: 2.75em; height: auto; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); }
    .sky-toggle input:checked + .sky-toggle__container { background-color: #1D1F2C; }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__circle { left: calc(100% - (3.375em - 2.5em) / 2 * -1 - 3.375em); }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__moon { transform: translate(0); }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__clouds { bottom: -4.062em; }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__stars { top: 50%; transform: translateY(-50%); }
    .sky-toggle__container:hover .sky-toggle__circle { left: calc((3.375em - 2.5em) / 2 * -1 + 0.187em); }
    .sky-toggle input:checked + .sky-toggle__container:hover .sky-toggle__circle { left: calc(100% - (3.375em - 2.5em) / 2 * -1 - 3.375em - 0.187em); }

    .app-header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
      color: white;
      padding: 36px 32px 28px;
      border-radius: 0 0 var(--radius) var(--radius);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(30,41,59,0.25);
      animation: fadeInUp 0.6s ease-out;
      text-align: center;
      width: 100vw; left: 50%; margin-left: -50vw;
    }
    .app-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--sky, #38bdf8), var(--violet, #a78bfa));
      pointer-events: none;
    }
    [data-theme="dark"] .app-header {
      background: linear-gradient(135deg, #111827 0%, #1e293b 50%, #2d3748 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .app-header h1 {
      font-family: 'Source Serif 4', serif;
      font-size: clamp(1.4rem, 3.5vw, 1.8rem);
      font-weight: 600;
      color: white;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .app-header h1 svg {
      width: 28px;
      height: 28px;
      opacity: 0.85;
    }
    .app-header .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }

    /* ── THEME TOGGLE ── */

    /* ── CATEGORY PILLS ── */
    .cat-nav {
      flex-shrink: 0;
      animation: fadeInUp 0.6s ease-out 0.05s both;
    }
    .cat-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: 'Source Sans 3', Arial, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cat-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .cat-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: var(--shadow-sm);
    }
    [data-theme="dark"] .cat-pill.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .cat-pill .cat-count {
      font-size: 10px;
      opacity: 0.6;
      font-weight: 400;
    }

    /* ── SUB-CATEGORY PILLS (segunda fila) ── */
    .sub-pills {
      margin-top: 4px;
      padding-top: 2px;
    }
    .sub-pills.animate-in {
      animation: fadeInUp 0.3s ease-out both;
    }
    .sub-pills .cat-pill {
      font-size: 11px;
      padding: 5px 12px;
      border-style: dashed;
    }
    .sub-pills .cat-pill.active {
      border-style: solid;
    }

    /* ── CARD / FORM ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      flex-shrink: 0;
      animation: fadeInUp 0.6s ease-out 0.1s both;
      backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
    }
    .form-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .form-group label.toggle-check {
      font-size: 13px;
      margin-bottom: 0;
      text-transform: none;
      letter-spacing: 0;
    }
    .form-group input,
    .form-group select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Source Sans 3', Arial, sans-serif;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,58,92,0.10);
      animation: focusPulse 0.6s ease-out;
    }
    [data-theme="dark"] .form-group input,
    [data-theme="dark"] .form-group select { background: var(--surface2); }
    [data-theme="dark"] .form-group input::placeholder { color: var(--text-light); }
    [data-theme="dark"] .form-group input:focus,
    [data-theme="dark"] .form-group select:focus {
      box-shadow: 0 0 0 3px rgba(147,197,253,0.15);
      animation: focusPulseDark 0.6s ease-out;
    }

    /* ── SELECT DESTACADO ── */
    select#procedimiento {
      background: #d6e4f0;
      color: #1a3a5c;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      border-color: #b8cfdf;
      transition: background 0.2s, box-shadow 0.2s;
      padding-right: 32px;
    }
    select#procedimiento:hover {
      background: #c5d9ec;
      box-shadow: var(--shadow);
    }
    select#procedimiento:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    [data-theme="dark"] select#procedimiento {
      background: #1e3a5f;
      color: #93c5fd;
      border-color: #2d5a8a;
    }
    select#procedimiento option {
      background: var(--surface);
      color: var(--text);
      padding: 4px 16px;
    }

    /* ── BUSCADOR INTERVENCIONES (pill compacto) ── */
    .search-pill-wrap {
      flex-shrink: 0;
      margin-right: 2px;
    }
    .search-proc-input {
      border: none;
      border-radius: 1rem;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Source Sans 3', sans-serif;
      color: var(--text);
      background: var(--bg);
      width: 160px;
      box-shadow: 5px 5px 12px #cacfd9,
                  -5px -5px 12px #eaeff5;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .search-proc-input:focus {
      outline: none;
      width: 210px;
      background: var(--bg);
      box-shadow: inset 4px 4px 10px #c8ced8,
                  inset -4px -4px 10px #f0f4fa;
    }
    .search-proc-input::placeholder {
      color: var(--text-light);
      font-weight: 400;
    }
    [data-theme="dark"] .search-proc-input {
      background: var(--surface2);
      box-shadow: 6px 6px 14px rgba(0,0,0,0.35),
                  -6px -6px 14px rgba(55,65,81,0.25);

    /* ── TOGGLE CHECK ── */
    .toggle-check {
      --cb-size: 22px;
      --cb-color: var(--accent);
      --cb-shadow: rgba(26, 58, 92, 0.25);
      --cb-border: var(--border);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: none;
      letter-spacing: 0;
      position: relative;
    }
    .toggle-check:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .toggle-check input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      cursor: pointer;
    }
    .toggle-check .checkmark {
      position: relative;
      width: var(--cb-size);
      height: var(--cb-size);
      border: 2px solid var(--accent);
      border-radius: 6px;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .toggle-check .checkmark::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform: scale(0) rotate(-45deg);
    }
    .toggle-check input:checked ~ .checkmark::before {
      opacity: 1;
      transform: scale(1) rotate(0);
    }
    .toggle-check .checkmark svg {
      width: 0;
      height: 0;
      color: white;
      z-index: 1;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .toggle-check input:checked ~ .checkmark svg {
      width: 14px;
      height: 14px;
      transform: rotate(360deg);
    }
    .toggle-check:hover .checkmark {
      border-color: var(--accent-hover);
      transform: scale(1.08);
    }
    .toggle-check input:checked ~ .checkmark {
      border-color: var(--accent);
      animation: cbPulse 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    @keyframes cbPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.85); }
      100% { transform: scale(1); }
    }
    .toggle-check input:checked ~ span {
      color: var(--accent);
    }
    [data-theme="dark"] .toggle-check .checkmark {
      background: var(--surface2);
      border-color: var(--accent);
    }
    [data-theme="dark"] .toggle-check .checkmark::before {
      background: linear-gradient(135deg, var(--accent), #60a5fa);
    }

    /* ── BUTTONS ── */
    /* ── LATERALITY SWITCH ── */
    .lat-switch {
      --_switch-bg: var(--accent-light);
      --_slider-bg: var(--accent);
      --_slider-bg-on: var(--accent-hover);
      --_padding: 3px;
      width: fit-content;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      isolation: isolate;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
    }
    .lat-switch input { position: absolute; width: 1px; height: 1px; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .lat-switch > span {
      display: grid; place-content: center;
      padding: 12px 14px;
      font-size: 12px; font-weight: 600; font-family: 'Source Sans 3', sans-serif;
      color: var(--accent); white-space: nowrap;
      transition: opacity 0.3s ease-in-out 0.15s;
    }
    .lat-switch::before, .lat-switch::after {
      content: ""; position: absolute; border-radius: inherit;
    }
    .lat-switch::after { background: var(--_switch-bg); inset: 0; z-index: -2; }
    .lat-switch::before {
      background: var(--_slider-bg); z-index: -1;
      inset: var(--_padding) 50% var(--_padding) var(--_padding);
      transition: inset 0.5s cubic-bezier(0.47, 1.64, 0.41, 0.8), background-color 0.5s;
      box-shadow: inset 0 1px 1px rgba(0,0,0,0.15), 0 1px rgba(255,255,255,0.2);
    }
    .lat-switch:has(input:checked)::before {
      background: var(--_slider-bg-on);
      inset: var(--_padding) var(--_padding) var(--_padding) 50%;
    }
    /* labels opacity */
    .lat-switch > span:last-of-type,
    .lat-switch > input:checked + span:first-of-type { opacity: 0.5; }
    .lat-switch > input:checked ~ span:last-of-type { opacity: 1; color: white; }
    .lat-switch > span:first-of-type { opacity: 1; color: white; }
    .lat-switch:has(input:checked) > span:first-of-type { opacity: 0.5; color: var(--accent); }
    /* hover */
    .lat-switch:has(input:not(:checked)):hover::before {
      inset: var(--_padding) 45% var(--_padding) var(--_padding);
    }
    .lat-switch:has(input:checked):hover::before {
      inset: var(--_padding) var(--_padding) var(--_padding) 45%;
    }
    /* focus */
    .lat-switch:focus-within::after { inset: -2px; }
    /* dark mode */
    [data-theme="dark"] .lat-switch {
      --_switch-bg: rgba(147,197,253,0.15);
      --_slider-bg: var(--accent);
      --_slider-bg-on: #60a5fa;
    }
    [data-theme="dark"] .lat-switch > span { color: var(--accent); }
    [data-theme="dark"] .lat-switch > span:first-of-type { color: white; }
    [data-theme="dark"] .lat-switch:has(input:checked) > span:first-of-type { color: var(--accent); }
    [data-theme="dark"] .lat-switch:has(input:checked) > span:last-of-type { color: white; }

  function normalizar(str) {
    return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function hoy() {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = String(d.getFullYear()).slice(-2);
    return `${dd}/${mm}/${yy}`;
  }

  function cargarPlantilla() {
    const proc = document.getElementById('procedimiento').value;
    const doc  = (document.getElementById('doctor').value.trim() || 'DOCTOR').toUpperCase();
    const ayu  = (document.getElementById('ayudante').value.trim() || 'AYUDANTE').toUpperCase();
    const lado = document.getElementById('lateralidad').checked ? 'I' : 'D';
    // Mostrar/ocultar toggle de ejercicios para prótesis de rodilla
    const ejWrap = document.getElementById('ejerciciosToggleWrap');
    const esPTR = activeCat === 'ptr' || CATEGORIAS.find(c => c.id === 'ptr')?.procs.some(p => p.value === proc);
    const esPTC = activeCat === 'ptc' || CATEGORIAS.find(c => c.id === 'ptc')?.procs.some(p => p.value === proc);
    const esLCA = activeCat === 'lca' || CATEGORIAS.find(c => c.id === 'lca')?.procs.some(p => p.value === proc);
    const esCAR = activeCat === 'car' || CATEGORIAS.find(c => c.id === 'car')?.procs.some(p => p.value === proc);
    const FERULA_PROCS = ['rafi_edr_aculoc2', 'rafi_tobillo', 'ms_fr_olecranon_placa', 'ms_fr_olecranon_cerclaje', 'ms_fr_cubito_radio', 'aquiles'];
    const necesitaFerula = FERULA_PROCS.includes(proc);
    ejWrap.style.display = esPTR ? '' : 'none';
    // Mostrar/ocultar toggles isquemia, drenaje y férula
    document.getElementById('isquemiaToggleWrap').style.display = esPTR ? '' : 'none';
    document.getElementById('drenajeToggleWrap').style.display = (esPTR || esPTC || esLCA || esCAR) ? '' : 'none';
    // Toggle Sutura meniscal solo en LCA (excepto en la propia plantilla de sutura)
    const mostrarSutura = esLCA && proc !== 'lca_procinch_sutura';
    document.getElementById('suturaToggleWrap').style.display = mostrarSutura ? '' : 'none';
    document.getElementById('ferulaTraumaToggleWrap').style.display = necesitaFerula ? '' : 'none';
    // Mostrar contenedor extras si algún toggle es visible
    document.getElementById('extrasToggleWrap').style.display = (esPTR || esPTC || esLCA || esCAR || necesitaFerula) ? '' : 'none';
    // Aplicar defaults al cambiar de procedimiento
    if (proc && proc !== lastProc) {
      const defs = TOGGLE_DEFAULTS[proc];
      if (defs) {
        document.getElementById('incluirIsquemia').checked = defs.isquemia;
        document.getElementById('incluirDrenaje').checked = defs.drenaje;
        document.getElementById('incluirFerulaTrauma').checked = defs.ferula !== undefined ? defs.ferula : false;
      } else {
        document.getElementById('incluirIsquemia').checked = false;
        document.getElementById('incluirDrenaje').checked = false;
        document.getElementById('incluirFerulaTrauma').checked = false;
      }
      document.getElementById('incluirSuturaMeniscal').checked = false;
      lastProc = proc;
    }
    if (!proc) return;
    const isquemia = document.getElementById('incluirIsquemia').checked;
    const drenaje = document.getElementById('incluirDrenaje').checked;
    const ferula = document.getElementById('incluirFerulaTrauma').checked;
    const t = obtenerPlantillas(doc, ayu, lado, isquemia, drenaje, ferula);
    const datos = t[proc];
    if (!datos) return;
    const hojaEl = document.getElementById('hojaOperatoria');
    const trataEl = document.getElementById('tratamientoAlta');
    // Reemplazar --- residuales con lateralidad abreviada
    // Reemplazar "---." → "derecho." y "---" sueltos → "derecho"
    const ladoStr = lado === 'D' ? 'derecho' : lado === 'I' ? 'izquierdo' : '';
    function reemplazarLado(txt) {
      if (!ladoStr) return txt;
      return txt.replace(/---\./g, ladoStr + '.').replace(/---/g, ladoStr);
    }
    hojaEl.value = reemplazarLado(datos.hoja);
    // Concatenar ejercicios si el toggle está activo
    let trat = datos.tratamiento;
    if (datos.tratamiento_ejercicios && document.getElementById('incluirEjercicios').checked) {
      trat += '\n\n' + datos.tratamiento_ejercicios;
    }
    // Sutura meniscal: sustituir bloque de carga/movilidad/ejercicios por el protocolo protegido
    if (esLCA && mostrarSutura && document.getElementById('incluirSuturaMeniscal').checked) {
      const bloqueSutura = `CARGA
Puede caminar con ayuda de 2 muletas SIN APOYO inicial de la pierna intervenida:
- Semana 0 – semana 3: descarga completa.
- Semana 3 – semana 6: carga parcial ayudado de bastones.
- A partir semana 6: puede caminar libremente sin bastones (apoyo completo).

MOVILIDAD
Aumento progresivo de la movilidad para protección de la sutura meniscal:
- Semana 0 - semana 2: 0º a 60º.
- Semana 2 - semana 4: 0º a 90º.
- Semana 4 - semana 6: 0º a 90º (mantener protección).
- Semana 6 - semana 8: progresión a 120º.
- A partir semana 8: movilidad libre.

REHABILITACIÓN
- Realizar ejercicios isométricos de cuádriceps y elevación con pierna extendida.
- Movilizaciones pasivas de rótula 4/5 veces al día durante 15 minutos.`;
      trat = trat.replace(/CARGA\n- Semana 0 – 2: carga completa según tolerancia con 2 muletas\.\n- Semana 2 – 4: retirar muletas progresivamente cuando la marcha sea simétrica y sin dolor\.\n\nMOVILIDAD\n- Libre según tolerancia desde el día 0\.\n- Objetivo: 90° a las 2 semanas, rango completo a las 4-6 semanas\.\n\nREHABILITACIÓN\n- Realizar ejercicios de cuádriceps y movilidad de la rodilla\.\n- Movilizaciones pasivas de rótula 4\/5 veces al día durante 15 minutos\./, bloqueSutura);
    }
    trataEl.value = reemplazarLado(trat);
    // Flash animation
    hojaEl.classList.remove('flash');
    trataEl.classList.remove('flash');
    void hojaEl.offsetWidth;
    hojaEl.classList.add('flash');
    trataEl.classList.add('flash');
    // Botón postoperatorio
    const rehabWrap = document.getElementById('rehabWrap');
    let postopId = POSTOP_MAP[proc];
    // LCA combinada con sutura meniscal → activar también el chip menisco en postop.
    // Aplica a procedimientos LCA con sutura/raíz intrínseca o cuando el toggle
    // "Sutura meniscal" está marcado.
    let comboMenisco = false;
    if (postopId === 'lca') {
      const procImplicaMenisco = proc === 'lca_procinch_sutura'
        || proc === 'lca_procinch_reinsercion'
        || proc === 'rodilla_car_ovt_lca_medcontech';
      const sutChecked = mostrarSutura && document.getElementById('incluirSuturaMeniscal').checked;
      if (procImplicaMenisco || sutChecked) {
        postopId = 'lca,sutura_meniscal';
        comboMenisco = true;
      }
    }
    if (postopId) {
      const qs = new URLSearchParams();
      qs.set('m', 'postoperatorio');
      qs.set('doc', postopId);
      const lcaPreset = LCA_PRESETS[proc];
      if (lcaPreset && (postopId === 'lca' || comboMenisco)) {
        if (lcaPreset.lca_tipo)    qs.set('lca_tipo', lcaPreset.lca_tipo);
        if (lcaPreset.lca_injerto) qs.set('lca_injerto', lcaPreset.lca_injerto);
      }
      const menPreset = MENISCO_PRESETS[proc];
      if (menPreset && comboMenisco && menPreset.menisco_proc) {
        qs.set('menisco_proc', menPreset.menisco_proc);

  function copiarTexto(id, btn) {
    const text = document.getElementById(id).value;
    if (!text) { mostrarToast('Seleccione una plantilla primero', 'green'); return; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
    showCopied(btn);
  }

  function fallbackCopy(text) {
    const ta = Object.assign(document.createElement('textarea'), { value: text });
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  };

  // Construir mapa inverso: palabra clave → [abreviaturas que matchea]
  const _abrevIndex = {};
  for (const [abr, keywords] of Object.entries(ABREV)) {
    for (const kw of keywords) {
      const nkw = normalizar(kw);
      if (!_abrevIndex[nkw]) _abrevIndex[nkw] = [];
      _abrevIndex[nkw].push(normalizar(abr));
    }
  }

  function expandirQuery(q) {
    // Devuelve array de términos extra que deben matchear
    const extras = new Set();
    for (const [keyword, abrs] of Object.entries(_abrevIndex)) {
      if (keyword.includes(q) || q.includes(keyword)) {
        abrs.forEach(a => extras.add(a));
      }
    }
    return [...extras];
  }

  function filtrarProcedimientos() {
    const query = normalizar(document.getElementById('buscarProc').value.trim());
    const sel = document.getElementById('procedimiento');
    if (!query) {
      // Restaurar lista de la categoría/región actual
      if (activeCat) {
        const cat = CATEGORIAS.find(c => c.id === activeCat);
        if (cat) {
          sel.innerHTML = '<option value="">— Seleccione procedimiento —</option>' +
            [...cat.procs].sort((a, b) => a.label.localeCompare(b.label, 'es'))
              .map(p => `<option value="${p.value}">${p.label}</option>`).join('');
        }
      } else if (activeRegion) {
        populateAllProcs();
        return;
      }
      sel.value = '';
      cargarPlantilla();
      return;
    }
    // Expandir query con abreviaturas
    const extras = expandirQuery(query);
    // Buscar en TODAS las categorías
    const allProcs = CATEGORIAS.flatMap(c => c.procs);
    const matches = allProcs.filter(p => {
      const lab = normalizar(p.label);
      if (lab.includes(query)) return true;
      return extras.some(ex => lab.includes(ex));
    });
    sel.disabled = false;
    sel.innerHTML = '<option value="">— ' + matches.length + ' resultado' + (matches.length !== 1 ? 's' : '') + ' —</option>' +
      matches.sort((a, b) => a.label.localeCompare(b.label, 'es'))
        .map(p => `<option value="${p.value}">${p.label}</option>`).join('');
    // Si solo hay un resultado, seleccionarlo automáticamente
    if (matches.length === 1) {
      sel.value = matches[0].value;
      cargarPlantilla();
    }
  }

  }

  function onUrgDiagnosticoChange() {
    const diag = document.getElementById('urgDiagnostico').value;
    // Mostrar/ocultar selector Tipo
    const tipoGroup = document.getElementById('urgTipoGroup');
    tipoGroup.style.display = URG_CON_TIPO.includes(diag) ? '' : 'none';
    if (!URG_CON_TIPO.includes(diag)) document.getElementById('urgTipo').value = 'C';
    // Activar/desactivar lateralidad
    const ladoGroup = document.getElementById('urgLadoGroup');
    const sinLado = URG_SIN_LADO.includes(diag);
    ladoGroup.style.opacity = sinLado ? '0.4' : '1';
    ladoGroup.style.pointerEvents = sinLado ? 'none' : '';
    cargarPlantillaUrg();
  }

  function cargarPlantillaUrg() {
    const diag = document.getElementById('urgDiagnostico').value;
    const sexo = document.getElementById('urgSexo').checked ? 'M' : 'H';
    const edad = document.getElementById('urgEdad').value;
    const lado = document.getElementById('urgLado').checked ? 'I' : 'D';
    const tipo = document.getElementById('urgTipo').value;
    const raw1 = document.getElementById('urgCot1').value.trim();
    const raw2 = document.getElementById('urgCot2').value.trim();
    const cot = urgCotLabel(raw1 || 'COT', raw2);
    const acudo = urgAcudo(raw1, raw2);
    const parte = urgParte(raw1, raw2);

    const anamEl = document.getElementById('urgAnamnesis');
    const expoEl = document.getElementById('urgExploracion');
    const planEl = document.getElementById('urgPlan');

    function resetUrg() {
      [anamEl, expoEl, planEl].forEach(el => { el.value = ''; el.style.height = ''; });
    }
    if (!diag) { resetUrg(); return; }

    const t = URG_PLANTILLAS[diag];
    if (!t) return;

    const e = edad || '___';
    anamEl.value = t.anamnesis(cot, acudo, parte, sexo, e, lado);
    expoEl.value = t.exploracion(cot, acudo, parte, sexo, e, lado);

    // Determinar plan según tipo
    if (URG_SIEMPRE_QX.includes(diag)) {
      planEl.value = t.plan_quirurgico(cot, acudo, parte, sexo, e, lado);
    } else if (URG_CON_TIPO.includes(diag) && tipo === 'Q') {
      planEl.value = t.plan_quirurgico(cot, acudo, parte, sexo, e, lado);
    } else {
      planEl.value = t.plan_conservador(cot, acudo, parte, sexo, e, lado);
    }

    // Re-append férula si el toggle está activo
    if (document.getElementById('incluirFerula').checked) {
      const sep = planEl.value.trim() ? '\n\n' : '';
      planEl.value = planEl.value.trimEnd() + sep + getCuidadosFerula(diag);
    }

    [anamEl, expoEl, planEl].forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    });
  }

  function copiarTodoUrg(btn) {
    const a = document.getElementById('urgAnamnesis').value;
    const e = document.getElementById('urgExploracion').value;
    const p = document.getElementById('urgPlan').value;
    const todo = [a, e, p].filter(Boolean).join('\n\n');
    if (!todo) { mostrarToast('Seleccione un diagnóstico primero', 'green'); return; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(todo).catch(function() { fallbackCopy(todo); });
    } else {
      fallbackCopy(todo);
    }
    showCopied(btn);
  }

  function limpiarUrg() {
    document.getElementById('urgCot1').value = '';
    document.getElementById('urgCot2').value = '';
    document.getElementById('urgSexo').checked = false;
    document.getElementById('urgEdad').value = '';
    document.getElementById('urgLado').checked = false;
    document.getElementById('urgTipo').value = 'C';
    document.getElementById('urgTipoGroup').style.display = 'none';
    document.getElementById('urgDiagnostico').value = '';
    ['urgAnamnesis', 'urgExploracion', 'urgPlan'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.style.height = '';
    });
    // Restaurar lateralidad
    const ladoGroup = document.getElementById('urgLadoGroup');
    ladoGroup.style.opacity = '1';
    ladoGroup.style.pointerEvents = '';
    // Restaurar férula toggle
    document.getElementById('incluirFerula').checked = false;
  }

  // Diagnósticos de miembro superior (no aplicar recomendaciones de carga/bota de yeso)
  const URG_DIAG_MS = ['urg_fx_edr', 'urg_fx_5mtc', 'urg_fx_eph', 'urg_herida_tendon', 'urg_lux_hombro'];

  function getCuidadosFerula(diag) {
    const esMS = URG_DIAG_MS.includes(diag);
    const lineaExtremidad = esMS
      ? '- Eleve el brazo lesionado por encima de la altura del corazón y apóyelo sobre almohadas u otro elemento de soporte. Use el cabestrillo si se le ha indicado.'
      : '- Eleve la pierna lesionada por encima de la altura del corazón y apóyela sobre almohadas u otro elemento de soporte; deberá reclinarse para mantener la elevación.';
    const lineaDedos = esMS
      ? '- Mueva suavemente y con frecuencia los dedos de la mano.'
      : '- Mueva suavemente y con frecuencia los dedos del pie.';
    const lineaHormigueo = esMS
      ? '- Entumecimiento y hormigueo en la mano, que pueden ser causados por demasiada presión sobre los nervios.'
      : '- Entumecimiento y hormigueo en el pie, que pueden ser causados por demasiada presión sobre los nervios.';
    const lineaMovActivo = esMS
      ? '- Pérdida del movimiento activo de los dedos de la mano.'
      : '- Pérdida del movimiento activo de los dedos del pie.';
    const lineaBota = esMS
      ? ''
      : '\n- No camine con la "bota de yeso" hasta que esté completamente seca y dura. No camine con el yeso sin tacón de apoyo. El yeso necesita 48-72 horas para endurecerse lo suficiente como para poder caminar.';

    return `RECOMENDACIONES FÉRULA/YESO

CÓMO ACOSTUMBRARSE A UNA FÉRULA O A UN YESO
- La hinchazón causada por su lesión puede generar presión sobre su férula o yeso durante las primeras 48 a 72 horas.
- Esto puede causar la sensación de que la férula o el yeso están demasiado apretados.

PARA REDUCIR LA HINCHAZÓN
${lineaExtremidad}
${lineaDedos}

SIGNOS DE ALERTA TRAS LA APLICACIÓN DE UNA FÉRULA O YESO
- Si observa alguno de los siguientes signos de alerta, acuda a su Médico de Cabecera o al Servicio de Urgencias:
- Aumento del dolor, que puede ser causado por la hinchazón, y la sensación de que la férula o el yeso están demasiado ajustados.
${lineaHormigueo}
- Ardor y escozor, que pueden ser causados por demasiada presión sobre la piel.
- Excesiva hinchazón por debajo del yeso, que puede indicar que el yeso está reduciendo la circulación sanguínea.
${lineaMovActivo}
- Fiebre o drenaje y mal olor proveniente del yeso.

CÓMO CUIDAR SU FÉRULA Y YESO
- Mantenga la férula o el yeso secos. La humedad debilita el yeso y puede causar irritación de la piel. Coloque bolsas de plástico o protectores impermeables mientras se ducha o se baña.${lineaBota}
- Mantenga el interior de la férula o del yeso libre de suciedad, arena y polvo.
- No retire el algodón de la férula o yeso.
- No utilice objetos como ganchos de ropa para rascarse la piel dentro de la férula o yeso. No aplique talco ni desodorante sobre la piel con escozor. Si la picazón persiste, comuníquese con su médico.
- No arranque ni recorte los bordes ásperos del yeso antes de consultar a su médico.`;
  }

  function toggleFerula() {
    const checked = document.getElementById('incluirFerula').checked;
    const planEl = document.getElementById('urgPlan');
    if (checked) {
      // Añadir al final del plan
      const diag = document.getElementById('urgDiagnostico').value;
      const sep = planEl.value.trim() ? '\n\n' : '';
      planEl.value = planEl.value.trimEnd() + sep + getCuidadosFerula(diag);
      planEl.style.height = 'auto';
      planEl.style.height = planEl.scrollHeight + 'px';
      planEl.classList.remove('flash');
      void planEl.offsetWidth;
      planEl.classList.add('flash');
    } else {
      // Quitar el bloque de férula del plan
      planEl.value = planEl.value.replace(/\n?\n?RECOMENDACIONES FÉRULA\/YESO[\s\S]*$/, '').trimEnd();
      planEl.style.height = 'auto';
      planEl.style.height = planEl.scrollHeight + 'px';
    }
  }

Encamado (primeros días tras intervención)

- Mover el tobillo:
  Objetivo: Facilitar el retorno venoso y reducir la inflamación.

  Frecuencia: Realice el mayor número de veces posible durante el día.

- Contracción del cuádriceps:
  Objetivo: Fortalecer el músculo del muslo y mejorar la extensión de la rodilla.
  Cómo hacerlo: Coloque una toalla enrollada debajo de la rodilla. Contraiga el cuádriceps (músculo del muslo) intentando "aplastar" la toalla contra la cama.
  Duración: Mantenga la contracción durante 5 segundos.

  Objetivo: Fortalecer los músculos de la pierna operada.

- Flexión de rodilla en cama:
  Objetivo: Mejorar el rango de movimiento de la rodilla.
  Cómo hacerlo: Deslice el talón de la pierna operada hacia los glúteos doblando la rodilla. Mantenga la flexión máxima por 5 segundos y luego vuelva a estirar la pierna.
  Repeticiones: Realice de 10 a 15 veces, 2-3 veces al día.

Ejercicios sentado(a) en silla

- Flexión de rodilla:
  Objetivo: Mejorar la flexión de la rodilla.
  Cómo hacerlo: Sentado(a) en el borde de una silla, con el pie en el suelo, flexione la rodilla operada lo máximo posible. Ayúdese con la pierna sana para aumentar la flexión. Mantenga la posición durante 5-10 segundos y luego estire la pierna.
  Repeticiones: Hágalo de 10 a 15 veces, 2-3 veces al día.

- Extensión de rodilla:
  Objetivo: Mejorar la extensión completa de la rodilla.
  Cómo hacerlo: Sentado(a) en el borde de la silla, estire la pierna operada lo máximo posible. Ayúdese con la pierna sana para lograr una extensión máxima. Mantenga la posición durante 5-10 segundos y luego vuelva a la posición inicial.
  Repeticiones: Realice de 10 a 15 veces, 2-3 veces al día.

- Extensión pasiva de rodilla:
  Objetivo: Mejorar la movilidad y reducir la rigidez.
  Cómo hacerlo: Coloque una silla frente a usted y extienda la pierna operada sobre ella, dejando que la rodilla se relaje y se extienda de forma pasiva durante 5-10 minutos.
  Frecuencia: Hágalo después de los ejercicios de flexión-extensión.

- Potenciación de aductores:
  Objetivo: Fortalecer los músculos aductores del muslo.
  Cómo hacerlo: Coloque un cojín entre los muslos y presione hacia el centro con ambas piernas.
  Duración: Mantenga la presión por 10 segundos.
  Repeticiones: Realice 10 veces, 2-3 veces al día.

CAMINAR CON MULETAS
- Primer paso: Avance las muletas.
- Segundo paso: Adelante la pierna operada hasta el nivel de las muletas.
- Tercer paso: Avance la pierna sana.

Uso de una sola muleta
- Cuando pase a usar una sola muleta, esta debe estar en el lado contrario a la pierna operada, avanzando a la vez que la pierna intervenida.

CAMINAR CON ANDADOR
- Coloque el andador frente a usted, con las cuatro patas firmemente apoyadas en el suelo. Ajústelo a su altura.
- Paso 1: Desplace el andador un paso hacia adelante (aproximadamente un brazo de distancia).
- Paso 2: Avance la pierna operada hacia el centro del andador, entre las patas delanteras.
- Paso 3: Avance la pierna sana hasta alcanzar la posición de la pierna operada.
- Repita el ciclo manteniendo el andador siempre delante de usted.

Consejos
- Mantenga una postura erguida para reducir el riesgo de caídas.

Para subir escaleras
- Coloque la pierna sana en el escalón superior.
- Apóyese en las muletas y la pierna sana para levantar la pierna operada.

Para bajar escaleras
- Coloque las muletas en el escalón inferior.
- Baje la pierna operada.

CUIDADOS DE LA HERIDA
- Mantenga la herida limpia y seca. Cambie los apósitos según lo indicado por su médico.

- 1ª y 2ª SEMANAS
- Carga parcial con dos muletas.
- Frío local durante 15min / varias veces al día. Nunca directamente sobre la piel.
- Todos los ejercicios deben realizarse en un rango de movilidad sin dolor.
- Realizar 10 repeticiones de cada grupo muscular de 3 a 4 veces al día.

Ejercicios:
- Evitar las elevaciones de la pierna recta (especialmente en pacientes con lesiones articulares).
- Flexión – Extensión de cadera: doblando la rodilla de la pierna afecta y deslizando el talón hacia la nalga tanto como sea posible. Cuando haya conseguido la máxima flexión, volver a poner la pierna recta.
- Rotación interna/externa: con la pierna recta realizar giros con los pies hacia dentro y hacia fuera. No forzar las rotaciones ( sobre todo tener precaución con la rotación interna ).
- Ejercicios circulatorios y de flexo – extensión del tobillo.
- Realizar cambios de posición frecuentes (sentarse/estirarse).
- Realizar contracciones isométricas de Cuádriceps e isquiotibiales, realizar contracciones simultáneas de ambos.
- Realizar contracciones isométricas de Abductores (cinta alrededor de los muslos y empujar hacia fuera).
- Realizar contracciones isométricas de Adductores (con una almohada entre los muslos).
- Realizar contracciones isométricas de Glúteos.
- En el momento que podamos sentarnos cómodamente, sin tensiones, podemos iniciar rodaje suave en bicicleta estática con el sillín alto para evitar flexión de la cadera >90 grados.
- No realizar movimientos bruscos.

Limitación del rango de movilidad:
- Extensión : 10 grados.
- Flexión : 90 grados.
- Abducción: 30 grados.
- Adducción: 30 grados.
- Rotación interna en flexión: 20 grados.
- Rotación externa en flexión : 70 grados.

RECUERDE: NO TODAS LAS ARTROSCOPIAS DE CADERAS SON IGUALES.
- Cada paciente evoluciona de forma diferente en función de la cirugía realizada, edad, el estado de salud previo y su
- capacidad para adaptarse a la Rehabilitación.
- Una complicación frecuente durante el programa de rehabilitación es la tendinitis del tendón del Psoas Iliaco. Cursa con dolor inguinal anterior y ocurre porque nos hemos excedido en los ejercicios. En tal caso, debemos acudir al médico/fisioterapeuta para reconducir la rehabilitación.
- 3ª y 4ª SEMANAS
- Ir aumentando progresivamente la carga parcial con dos muletas de la pierna operada para conseguir soltar una muleta al final de la 3ª semana y sin muletas sobre la 4ª o 5ª semana.
- Frío local durante 15min / varias veces al día. Nunca directamente sobre la piel.
- Todos los ejercicios deben realizarse en un rango de movilidad sin dolor.
- Realizar 10 repeticiones de cada grupo muscular de 3 a 4 veces al día.

Continuar con ejercicios previos y añadir los siguientes:
- Puente con dos piernas (pelvis neutra): tumbado boca arriba con las rodillas flexionadas y los pies apoyados en el suelo paralelos entre sí, elevar las caderas.
- Ejercicios de extensión de rodilla: colocar una toalla enrollada (15 cm de diámetro) bajo la rodilla de la pierna afectada. Poner la pierna recta sin perder el contacto del muslo con el rollo
- Abducción de caderas: con las piernas rectas, desplazar la pierna afectada lateralmente tanto como sea posible para después volver a juntarlas.
- (sigue en el siguiente apartado de recomendaciones generales)

RECOMENDACIONES GENERALES:
- Sentados en una silla, flexionar el cuerpo hacia delante progresivamente (teniendo en cuenta la tensión en la zona inguinal y no presencia de dolor).
- Bicicleta estática (10-15 min con mínima resistencia).
- Ejercicios en el agua, siempre que las heridas estén bien cicatrizadas y el entorno tenga fácil acceso (lo ideal es que el agua le llegue a la altura del pecho o cómo mínimo a la cintura):

- Desplazarse lateralmente.
- Flexo-extensión de cadera, abducción de cadera y simular bicicleta suavemente.

Limitación del rango de movilidad:
- Extensión : 20 grados.
- Flexión : 120 grados.
- Abducción: 45 grados.
- Adducción: 45 grados.
- Rotación interna en flexión: 30 grados.
