<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="420" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <!-- Clipboard body -->
  <rect x="136" y="100" width="240" height="320" rx="24" fill="white" opacity="0.95"/>
  <!-- Clipboard top clip -->
  <rect x="196" y="76" width="120" height="48" rx="12" fill="#1a3a5c"/>
  <rect x="220" y="84" width="72" height="12" rx="6" fill="white" opacity="0.5"/>
  <!-- Document lines -->
  <rect x="172" y="168" width="168" height="8" rx="4" fill="#1a3a5c" opacity="0.18"/>
  <rect x="172" y="192" width="128" height="8" rx="4" fill="#1a3a5c" opacity="0.13"/>
  <rect x="172" y="224" width="168" height="8" rx="4" fill="#1a3a5c" opacity="0.18"/>
  <rect x="172" y="248" width="100" height="8" rx="4" fill="#1a3a5c" opacity="0.13"/>
  <rect x="172" y="280" width="168" height="8" rx="4" fill="#1a3a5c" opacity="0.18"/>
  <rect x="172" y="304" width="140" height="8" rx="4" fill="#1a3a5c" opacity="0.13"/>
  <!-- Scalpel across clipboard -->
  <g transform="translate(320, 330) rotate(-40)">
    <rect x="-5" y="-60" width="10" height="44" rx="3" fill="#0ea5e9" opacity="0.9"/>
    <path d="M -5 -16 L 0 44 L 5 -16 Z" fill="white" opacity="0.8"/>
  </g>
  <!-- Checkmark dots (template indicator) -->
  <circle cx="160" cy="172" r="5" fill="#4caf7d" opacity="0.8"/>
  <circle cx="160" cy="228" r="5" fill="#4caf7d" opacity="0.8"/>
  <circle cx="160" cy="284" r="5" fill="#4caf7d" opacity="0.8"/>
</svg>
